name: Alaveteli historical indexes

on:
  schedule:
    # Monthly refresh from Internet Archive only; no origin-site traffic.
    - cron: "27 3 1 * *"
  workflow_dispatch:
    inputs:
      cdx_limit:
        description: Maximum archived request URLs per deployment
        required: true
        default: "1000"
        type: string

permissions:
  contents: read

concurrency:
  group: alaveteli-historical-indexes
  cancel-in-progress: false

jobs:
  prepare-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@94527f2e458b27549849d47d273a16bec83a01e9 # v7
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: uv sync --extra dev --frozen
      - name: Validate registry and build bounded matrix
        id: matrix
        run: |
          set -euo pipefail
          uv run python scripts/build_internet_archive_matrix.py --validate
          matrix="$(uv run python scripts/build_internet_archive_matrix.py)"
          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"
  index:
    needs: prepare-matrix
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix: ${{ fromJSON(needs.prepare-matrix.outputs.matrix) }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      CDX_LIMIT: ${{ inputs.cdx_limit || '1000' }}
      INSTANCE: ${{ matrix.instance }}
      HOST: ${{ matrix.host }}
      REQUEST_PATH: ${{ matrix.request_path }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@94527f2e458b27549849d47d273a16bec83a01e9 # v7
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: uv sync --extra dev --frozen
      - name: Download Internet Archive CDX index
        run: |
          set -euo pipefail
          mkdir -p ".tmp/$INSTANCE"
          status=success
          if ! curl --fail-with-body --location --silent --show-error \
            --retry 1 --retry-delay 30 --max-time 180 \
            -A "fyi-archive-historical-index/1.0 (+https://github.com/${GITHUB_REPOSITORY})" \
            --get "https://web.archive.org/cdx/search/cdx" \
            --data-urlencode "url=$HOST$REQUEST_PATH" \
            --data-urlencode "output=json" \
            --data-urlencode "filter=statuscode:200" \
            --data-urlencode "fl=original,timestamp,digest" \
            --data-urlencode "collapse=urlkey" \
            --data-urlencode "limit=$CDX_LIMIT" \
            --output ".tmp/$INSTANCE/internet_archive_cdx.json"; then
            status=failed
            printf '[]\n' > ".tmp/$INSTANCE/internet_archive_cdx.json"
          fi
          cd_hash="$(shasum -a 256 ".tmp/$INSTANCE/internet_archive_cdx.json" | awk '{print $1}')"
          export CDX_STATUS="$status" CDX_HASH="$cd_hash"
          python - <<'PY'
          import json
          import os
          from datetime import UTC, datetime
          from pathlib import Path

          payload = {
              "instance_id": os.environ["INSTANCE"],
              "host": os.environ["HOST"],
              "request_path": os.environ["REQUEST_PATH"],
              "query_url": "https://web.archive.org/cdx/search/cdx",
              "retrieved_at": datetime.now(UTC).isoformat().replace("+00:00", "Z"),
              "status": os.environ["CDX_STATUS"],
              "response_sha256": os.environ["CDX_HASH"],
              "coverage": {
                  "record_count": max(len(json.loads(Path(f".tmp/{os.environ['INSTANCE']}/internet_archive_cdx.json").read_text(encoding="utf-8"))) - 1, 0),
                  "pagination_complete": False,
                  "reason": "bounded CDX limit; use the paginated source-artifact workflow before empirical freezing",
              },
              "eligible_for_empirical_freeze": False,
              "publication": False,
              "redistribution": False,
          }
          Path(f".tmp/{payload['instance_id']}/retrieval.json").write_text(
              json.dumps(payload, sort_keys=True) + "\n", encoding="utf-8"
          )
          PY
      - name: Build provenance-preserving index
        run: |
          set -euo pipefail
          uv run python scripts/import_historical_sources.py \
            --internet-archive-cdx ".tmp/$INSTANCE/internet_archive_cdx.json" \
            --instance-id "$INSTANCE" \
            --output ".tmp/$INSTANCE/historical-source-index.json"
      - name: Upload historical evidence
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: alaveteli-historical-${{ matrix.instance }}-${{ github.run_id }}
          retention-days: 90
          if-no-files-found: error
          path: .tmp/${{ matrix.instance }}/
