# Validate Metadata Parity
# Checks that metadata counts match across all mirrors (HF, Zenodo, OSF)

name: Validate Metadata Parity

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-metadata:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          submodules: recursive
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@94527f2e458b27549849d47d273a16bec83a01e9

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --extra dev --frozen

      - name: Validate mirror parity
        env:
          HF_RECORD_COUNT: ${{ vars.HF_RECORD_COUNT || '0' }}
          OSF_RECORD_COUNT: ${{ vars.OSF_RECORD_COUNT || '0' }}
          ZENODO_RECORD_COUNT: ${{ vars.ZENODO_RECORD_COUNT || '0' }}
        run: uv run fyi-archive doctor check --tolerance 5

      - name: Upload parity report
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: metadata-parity
          path: conductor/archive_health.json
