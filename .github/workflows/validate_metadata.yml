# Validate Metadata Parity
# Checks that metadata counts match across all mirrors (HF, Zenodo, OSF)

name: Validate Metadata Parity

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-metadata:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          persist-credentials: false

      - name: Get manifest record count
        id: manifest
        run: |
          if [ -f "manifests/latest_manifest.json" ]; then
            count=$(jq '.record_count // 0' manifests/latest_manifest.json)
            echo "count=$count" >> $GITHUB_OUTPUT
          else
            echo "count=0" >> $GITHUB_OUTPUT
          fi

      - name: Get Hugging Face record count
        id: hf-count
        run: |
          if [ -f "manifests/latest_manifest.json" ]; then
            count=$(jq '.record_count // 0' manifests/latest_manifest.json)
            echo "count=$count" >> $GITHUB_OUTPUT
          else
            echo "count=0" >> $GITHUB_OUTPUT
          fi

      - name: Get Zenodo record count
        id: zenodo-count
        run: |
          # In a full implementation, this would query the Zenodo API
          # For now, we'll use a placeholder
          echo "count=0" >> $GITHUB_OUTPUT

      - name: Get OSF record count
        id: osf-count
        run: |
          # In a full implementation, this would query the OSF API
          # For now, we'll use a placeholder
          echo "count=0" >> $GITHUB_OUTPUT

      - name: Compare counts
        id: compare
        run: |
          MANIFEST_COUNT=${{ steps.manifest.outputs.count }}
          HF_COUNT=${{ steps.hf-count.outputs.count }}
          ZENODO_COUNT=${{ steps.zenodo-count.outputs.count }}
          OSF_COUNT=${{ steps.osf-count.outputs.count }}

          echo "Manifest: $MANIFEST_COUNT"
          echo "HF: $HF_COUNT"
          echo "Zenodo: $ZENODO_COUNT"
          echo "OSF: $OSF_COUNT"

          MAX_DIFF=5

          DIFF_HF=$((MANIFEST_COUNT - HF_COUNT))
          DIFF_ZENODO=$((MANIFEST_COUNT - ZENODO_COUNT))
          DIFF_OSF=$((MANIFEST_COUNT - OSF_COUNT))

          if [ ${DIFF_HF#-} -gt $MAX_DIFF ] || [ ${DIFF_ZENODO#-} -gt $MAX_DIFF ] || [ ${DIFF_OSF#-} -gt $MAX_DIFF ]; then
            echo "Mismatch exceeds tolerance of $MAX_DIFF records" >&2
            exit 1
          fi

          echo "All counts within tolerance"

      - name: Fail on mismatch
        if: failure()
        run: |
          echo "Metadata validation failed - counts differ beyond tolerance"
          exit 1
