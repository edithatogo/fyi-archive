name: Validate Publishing Secrets

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Validate required publishing secrets
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_REPO_ID: ${{ vars.HF_REPO_ID }}
          OSF_TOKEN: ${{ secrets.OSF_TOKEN }}
          OSF_PARENT_ID: ${{ vars.OSF_PARENT_ID }}
          ZENODO_TOKEN: ${{ secrets.ZENODO_TOKEN }}
          ZENODO_SANDBOX_TOKEN: ${{ secrets.ZENODO_SANDBOX_TOKEN }}
        run: |
          set -euo pipefail
          python3 scripts/validate_secrets.py
