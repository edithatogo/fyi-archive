name: Zenodo Citation Update

on:
  workflow_dispatch:
    inputs:
      doi:
        description: Published Zenodo DOI, e.g. 10.5281/zenodo.1234567
        required: true
        type: string
      confirm:
        description: Type update-citation-doi to update CITATION.cff
        required: true
        type: string

permissions:
  contents: read

jobs:
  update-citation:
    if: inputs.confirm == 'update-citation-doi'
    runs-on: ubuntu-latest
    environment: zenodo-production
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@94527f2e458b27549849d47d273a16bec83a01e9 # v7
        with:
          enable-cache: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"

      - name: Update CITATION.cff DOI
        env:
          DOI: ${{ inputs.doi }}
        run: |
          set -euo pipefail
          uv run python scripts/update_citation_doi.py "$DOI"

      - name: Create DOI update pull request
        uses: peter-evans/create-pull-request@22a9089034f40e5a961c8808d113e2c98fb63676 # v7
        with:
          token: ${{ secrets.WORKFLOW_PAT }}
          commit-message: "docs: update Zenodo DOI citation"
          title: "docs: update Zenodo DOI citation"
          body: "Updates CITATION.cff after the annual Zenodo snapshot publish."
          branch: "release/update-zenodo-doi"
          add-paths: CITATION.cff
