name: AU jurisdiction rollout controller

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: Verify ordered controller and national manifest without network capture
        required: true
        default: true
        type: boolean
      fyi_cli_version:
        description: fyi-cli version recorded in generated manifests
        required: true
        default: "1.2.0"
        type: string
      max_requests:
        description: Per-jurisdiction capture cap for live rollout
        required: true
        default: "50"
        type: string
      max_runtime_minutes:
        description: Per-jurisdiction runtime cap for live rollout
        required: true
        default: "30"
        type: string
      catalog_url:
        description: Optional AU authority catalog URL override
        required: false
        type: string
      capture_base_url:
        description: Optional AU capture base URL override
        required: false
        type: string
      confirm_live:
        description: Required only for live capture; enter RUN_LIVE_AU_CAPTURE
        required: false
        default: ""
        type: string

permissions:
  contents: read

concurrency:
  group: au-jurisdiction-rollout
  cancel-in-progress: false

jobs:
  controller:
    runs-on: ubuntu-latest
    environment: au-live-capture
    permissions:
      contents: read
      actions: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@94527f2e458b27549849d47d273a16bec83a01e9 # v7
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: uv sync --extra dev --frozen
      - name: Run ordered AU controller smoke
        if: ${{ inputs.dry_run }}
        run: |
          set -euo pipefail
          uv run python scripts/run_au_rollout_controller.py \
            --state data/_state/au-rollout/state.json \
            --output-dir data/au-rtk/rollout \
            --fyi-cli-version "${{ inputs.fyi_cli_version }}" \
            --dry-run
      - name: Run capped sequential AU live rollout
        if: ${{ !inputs.dry_run }}
        env:
          CONFIRM_LIVE: ${{ inputs.confirm_live }}
        run: |
          set -euo pipefail
          if [ "$CONFIRM_LIVE" != "RUN_LIVE_AU_CAPTURE" ]; then
            echo "Live AU capture requires confirm_live=RUN_LIVE_AU_CAPTURE" >&2
            exit 1
          fi
          uv run python scripts/run_au_live_rollout.py \
            --config configs/au/jurisdiction_rollout.json \
            --state data/_state/au-rollout/state.json \
            --output-dir data/au-rtk/rollout \
            --provenance data/au-rtk/rollout/discovered_bodies.provenance.json \
            --rate-limit-db data/_state/au-rollout/fyi-cli.db \
            --repository "${{ github.repository }}" \
            --capture-base-url "${{ inputs.capture_base_url || 'https://www.righttoknow.org.au' }}" \
            --catalog-url "${{ inputs.catalog_url }}" \
            --fyi-cli-version "${{ inputs.fyi_cli_version }}" \
            --max-requests "${{ inputs.max_requests }}" \
            --max-runtime-minutes "${{ inputs.max_runtime_minutes }}"
      - name: Retain successful live catalog
        if: ${{ !inputs.dry_run && hashFiles('data/au-rtk/rollout/discovered_bodies.json') != '' }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: catalog-${{ github.run_id }}
          retention-days: 90
          path: |
            data/au-rtk/rollout/discovered_bodies.json
            data/au-rtk/rollout/discovered_bodies.provenance.json
      - name: Verify national manifest
        if: ${{ inputs.dry_run }}
        run: |
          set -euo pipefail
          uv run python - <<'PY'
          import json
          from pathlib import Path

          manifest = json.loads(Path("data/au-rtk/rollout/national_manifest.json").read_text())
          state = json.loads(Path("data/_state/au-rollout/state.json").read_text())
          if manifest["meta"]["instance_id"] != "au-rtk":
              raise SystemExit("national manifest instance guard failed")
          if manifest["meta"]["record_count"] != 10:
              raise SystemExit("national manifest jurisdiction count guard failed")
          if state["national_manifest"]["status"] != "complete":
              raise SystemExit("controller state did not complete national merge")
          PY
      - name: Upload controller evidence
        if: ${{ inputs.dry_run }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: au-jurisdiction-rollout-controller
          path: |
            data/_state/au-rollout
            data/au-rtk/rollout
      - name: Verify live national manifest and provenance
        if: ${{ !inputs.dry_run }}
        run: |
          set -euo pipefail
          uv run python - <<'PY'
          import json
          from pathlib import Path

          manifest = json.loads(Path("data/au-rtk/rollout/national_manifest.json").read_text())
          provenance = json.loads(Path("data/au-rtk/rollout/discovered_bodies.provenance.json").read_text())
          if manifest["meta"]["instance_id"] != "au-rtk":
              raise SystemExit("live national manifest instance guard failed")
          if not manifest["meta"]["record_count"]:
              raise SystemExit("live national manifest is empty")
          if provenance.get("mode") not in {"live", "fallback"}:
              raise SystemExit("catalog provenance mode is invalid")
          PY
