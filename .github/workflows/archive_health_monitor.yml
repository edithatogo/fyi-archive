# Archive Health Monitor
# Scheduled health check that fails on drift

name: Archive Health Monitor

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:
    inputs:
      instance:
        description: Archive instance to inspect
        required: true
        default: nz-fyi
        type: string
      jurisdiction:
        description: Optional jurisdiction scope (for example NSW)
        required: false
        type: string
      manifest_path:
        description: Manifest path to inspect when a local manifest is available
        required: true
        default: manifests/latest_manifest.json
        type: string

permissions:
  contents: read

jobs:
  health-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          submodules: recursive
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@94527f2e458b27549849d47d273a16bec83a01e9

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --extra dev --frozen

      - name: Resolve instance mirror identity
        env:
          INSTANCE: ${{ inputs.instance || 'nz-fyi' }}
          HF_REPO_ID_OVERRIDE: ${{ vars.HF_REPO_ID }}
        run: |
          set -euo pipefail
          repo_id="$HF_REPO_ID_OVERRIDE"
          if [ -z "$repo_id" ]; then
            repo_id="$(uv run python -c 'from fyi_archive.instances import get_instance; import os; print(get_instance(os.environ["INSTANCE"]).hf_repo_id)')"
          fi
          echo "HF_REPO_ID=$repo_id" >> "$GITHUB_ENV"
          echo "Inspecting instance $INSTANCE mirror $repo_id"

      - name: Run health check
        id: health
        env:
          # Live credentials — doctor queries mirrors when these are set.
          # Do not force RECORD_COUNT=0 here; that previously hid real HF data.
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_REPO_ID_OVERRIDE: ${{ vars.HF_REPO_ID }}
          ZENODO_TOKEN: ${{ secrets.ZENODO_TOKEN }}
          ZENODO_DEPOSITION_ID: ${{ vars.ZENODO_DEPOSITION_ID }}
          OSF_TOKEN: ${{ secrets.OSF_TOKEN }}
          OSF_PARENT_ID: ${{ vars.OSF_PARENT_ID }}
          OSF_NODE_ID: ${{ vars.OSF_NODE_ID }}
          # Optional positive overrides only (empty means "query live").
          HF_RECORD_COUNT: ${{ vars.HF_RECORD_COUNT }}
          OSF_RECORD_COUNT: ${{ vars.OSF_RECORD_COUNT }}
          ZENODO_RECORD_COUNT: ${{ vars.ZENODO_RECORD_COUNT }}
          COVERAGE_TARGET_PERCENT: ${{ vars.COVERAGE_TARGET_PERCENT || '60' }}
          COVERAGE_ID_HORIZON: ${{ vars.COVERAGE_ID_HORIZON || '250000' }}
          COVERAGE_TARGET_PERCENT_AU_RTK: ${{ vars.COVERAGE_TARGET_PERCENT_AU_RTK || '0' }}
          COVERAGE_ID_HORIZON_AU_RTK: ${{ vars.COVERAGE_ID_HORIZON_AU_RTK || '0' }}
          DOCTOR_TOLERANCE: ${{ vars.DOCTOR_TOLERANCE || '50' }}
          DOCTOR_INSTANCE: ${{ inputs.instance || 'nz-fyi' }}
          DOCTOR_JURISDICTION: ${{ inputs.jurisdiction || '' }}
          DOCTOR_MANIFEST_PATH: ${{ inputs.manifest_path || 'manifests/latest_manifest.json' }}
        run: |
          set -euo pipefail
          # Larger default skew while OSF may lag HF/Zenodo draft.
          args=(--tolerance "${DOCTOR_TOLERANCE:-50}" --instance "$DOCTOR_INSTANCE" --manifest-path "$DOCTOR_MANIFEST_PATH")
          if [ -n "$DOCTOR_JURISDICTION" ]; then args+=(--jurisdiction "$DOCTOR_JURISDICTION"); fi
          uv run fyi-archive doctor check "${args[@]}"
          cp conductor/archive_health.json health.json
          echo "health_json<<EOF" >> "$GITHUB_OUTPUT"
          cat health.json
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Upload health report
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: archive-health-${{ inputs.instance || 'nz-fyi' }}-${{ inputs.jurisdiction || 'all' }}
          path: health.json

      - name: Publish coverage progress summary
        run: |
          set -euo pipefail
          uv run python - <<'PY' >> "$GITHUB_STEP_SUMMARY"
          import json
          from pathlib import Path

          health = json.loads(Path("health.json").read_text(encoding="utf-8"))
          coverage = health["coverage"]
          status = "met" if coverage["target_met"] else "in progress"
          print("## Archive coverage progress")
          print()
          print(f"- Scope: `{coverage['instance_id']}`")
          print(f"- Records: **{coverage['records']:,}**")
          print(f"- Coverage: **{coverage['percent_covered']}%** of `{coverage['id_horizon']:,}`")
          print(f"- Target: **{coverage['target']}%** ({coverage['target_records']:,} records; {status})")
          print(f"- Remaining to target: **{coverage['remaining_to_target']:,}**")
          PY
