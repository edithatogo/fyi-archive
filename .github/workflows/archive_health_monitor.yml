# Archive Health Monitor
# Scheduled health check that fails on drift

name: Archive Health Monitor

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:
    inputs:
      instance:
        description: Archive instance to inspect
        required: true
        default: nz-fyi
        type: string
      jurisdiction:
        description: Optional jurisdiction scope (for example NSW)
        required: false
        type: string

permissions:
  contents: read

jobs:
  health-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          submodules: recursive
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@94527f2e458b27549849d47d273a16bec83a01e9

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --extra dev --frozen

      - name: Run health check
        id: health
        env:
          # Live credentials — doctor queries mirrors when these are set.
          # Do not force RECORD_COUNT=0 here; that previously hid real HF data.
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_REPO_ID: ${{ vars.HF_REPO_ID }}
          ZENODO_TOKEN: ${{ secrets.ZENODO_TOKEN }}
          ZENODO_DEPOSITION_ID: ${{ vars.ZENODO_DEPOSITION_ID }}
          OSF_TOKEN: ${{ secrets.OSF_TOKEN }}
          OSF_PARENT_ID: ${{ vars.OSF_PARENT_ID }}
          OSF_NODE_ID: ${{ vars.OSF_NODE_ID }}
          # Optional positive overrides only (empty means "query live").
          HF_RECORD_COUNT: ${{ vars.HF_RECORD_COUNT }}
          OSF_RECORD_COUNT: ${{ vars.OSF_RECORD_COUNT }}
          ZENODO_RECORD_COUNT: ${{ vars.ZENODO_RECORD_COUNT }}
          COVERAGE_TARGET_PERCENT: ${{ vars.COVERAGE_TARGET_PERCENT || '60' }}
          COVERAGE_ID_HORIZON: ${{ vars.COVERAGE_ID_HORIZON || '250000' }}
          COVERAGE_TARGET_PERCENT_AU_RTK: ${{ vars.COVERAGE_TARGET_PERCENT_AU_RTK || '0' }}
          COVERAGE_ID_HORIZON_AU_RTK: ${{ vars.COVERAGE_ID_HORIZON_AU_RTK || '0' }}
          DOCTOR_TOLERANCE: ${{ vars.DOCTOR_TOLERANCE || '50' }}
          DOCTOR_INSTANCE: ${{ inputs.instance || 'nz-fyi' }}
          DOCTOR_JURISDICTION: ${{ inputs.jurisdiction || '' }}
        run: |
          set -euo pipefail
          # Larger default skew while OSF may lag HF/Zenodo draft.
          args=(--tolerance "${DOCTOR_TOLERANCE:-50}" --instance "$DOCTOR_INSTANCE")
          if [ -n "$DOCTOR_JURISDICTION" ]; then args+=(--jurisdiction "$DOCTOR_JURISDICTION"); fi
          uv run fyi-archive doctor check "${args[@]}"
          cp conductor/archive_health.json health.json
          echo "health_json<<EOF" >> "$GITHUB_OUTPUT"
          cat health.json
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Upload health report
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: archive-health
          path: health.json
