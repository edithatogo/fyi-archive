name: Hugging Face Sync

on:
  schedule:
    - cron: "17 14 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: Run without fyi-cli network diff/capture
        required: true
        default: false
        type: boolean
      instance:
        description: Archive instance to sync
        required: true
        default: nz-fyi
        type: string

permissions:
  contents: read

concurrency:
  group: hf-sync-${{ github.ref }}
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          persist-credentials: false

      - uses: astral-sh/setup-uv@94527f2e458b27549849d47d273a16bec83a01e9

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --extra dev --frozen

      - name: Resolve instance publication identity
        env:
          INSTANCE: ${{ inputs.instance || 'nz-fyi' }}
          HF_REPO_ID_OVERRIDE: ${{ vars.HF_REPO_ID }}
        run: |
          set -euo pipefail
          repo_id="$HF_REPO_ID_OVERRIDE"
          if [ -z "$repo_id" ]; then
            repo_id="$(uv run python -c 'from fyi_archive.instances import get_instance; import os; print(get_instance(os.environ["INSTANCE"]).hf_repo_id)')"
          fi
          echo "HF_REPO_ID=$repo_id" >> "$GITHUB_ENV"
          echo "Syncing instance $INSTANCE to $repo_id"

      - name: Run prospective sync
        env:
          DRY_RUN: ${{ inputs.dry_run || 'false' }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          INSTANCE: ${{ inputs.instance || 'nz-fyi' }}
        run: |
          set -euo pipefail
          args=(
            --hf-repo-id "$HF_REPO_ID"
            --instance "$INSTANCE"
            --fyi-cli-version 1.2.0
            --health-path conductor/archive_health.json
          )
          if [ "$DRY_RUN" = "true" ]; then
            args+=(--dry-run)
          fi
          uv run fyi-archive sync run "${args[@]}" | tee sync-summary.json

      - name: Summarize sync
        run: |
          set -euo pipefail
          {
            echo "## HF sync"
            echo
            echo '```json'
            cat sync-summary.json
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Render verified dataset card
        run: |
          set -euo pipefail
          uv run python scripts/render_dataset_card.py \
            --card DATASET_CARD.md \
            --summary sync-summary.json \
            --output rendered-dataset-card.md

      - name: Upload verified dataset card
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          set -euo pipefail
          uv run python - <<'PY'
          import os
          from huggingface_hub import HfApi

          HfApi(token=os.environ["HF_TOKEN"]).upload_file(
              path_or_fileobj="rendered-dataset-card.md",
              path_in_repo="README.md",
              repo_id=os.environ["HF_REPO_ID"],
              repo_type="dataset",
              token=os.environ["HF_TOKEN"],
              commit_message="docs: refresh verified snapshot metadata",
          )
          PY

      - name: Upload sync artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: hf-sync
          path: |
            data/_state/sync_state.json
            manifests/latest_changes.json
            manifests/latest_manifest.json
            manifests/latest_manifest.parquet
            manifests/authorities.json
            conductor/archive_health.json
            sync-summary.json
            rendered-dataset-card.md
