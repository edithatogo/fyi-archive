name: Automated Historical Backfill

on:
  schedule:
    # Keep the controller ticking frequently so the worker pool refills quickly.
    - cron: "*/5 * * * *"
  workflow_run:
    workflows: ["Historical Backfill Batch"]
    types: [completed]
  workflow_dispatch:
    inputs:
      id_from:
        description: First FYI request ID to consider
        required: true
        default: "1"
        type: string
      id_to:
        description: Last FYI request ID to consider
        required: true
        default: "250000"
        type: string
      batch_span:
        description: Inclusive request-ID span per dispatched worker run
        required: true
        default: "500"
        type: string
      max_batches:
        description: Target number of concurrently running worker batches when manually triggered
        required: true
        default: "20"
        type: string
      worker_chunk_size:
        description: Inclusive request-ID span per worker matrix chunk
        required: true
        default: "50"
        type: string
      worker_max_chunks:
        description: Maximum chunks per worker run
        required: true
        default: "10"
        type: string
      max_requests_per_chunk:
        description: Maximum captured requests per worker chunk
        required: true
        default: "50"
        type: string
      max_runtime_minutes:
        description: Maximum runtime per worker chunk
        required: true
        default: "30"
        type: string
      max_disk_gb:
        description: Minimum free disk budget in GiB
        required: true
        default: "5"
        type: string
      dry_run:
        description: Dispatch dry-run worker batches instead of live FYI capture
        required: true
        default: false
        type: boolean
      state_label:
        description: GitHub issue label used to persist controller state
        required: true
        default: "fyi-backfill-state"
        type: string

concurrency:
  group: automated-historical-backfill
  cancel-in-progress: false

permissions:
  contents: read
  issues: write

jobs:
  dispatch:
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read
      issues: write
    env:
      BATCH_SPAN: ${{ inputs.batch_span || '500' }}
      DRY_RUN: ${{ inputs.dry_run || false }}
      GH_TOKEN: ${{ github.token }}
      ID_FROM: ${{ inputs.id_from || '1' }}
      ID_TO: ${{ inputs.id_to || '250000' }}
      TARGET_ACTIVE_WORKERS_INPUT: ${{ inputs.max_batches || '' }}
      TARGET_ACTIVE_WORKERS_DEFAULT: "20"
      TARGET_QUEUE_BUFFER: "20"
      MAX_DISK_GB: ${{ inputs.max_disk_gb || '5' }}
      MAX_REQUESTS_PER_CHUNK: ${{ inputs.max_requests_per_chunk || '50' }}
      MAX_RUNTIME_MINUTES: ${{ inputs.max_runtime_minutes || '30' }}
      REPO: ${{ github.repository }}
      STATE_LABEL: ${{ inputs.state_label || 'fyi-backfill-state' }}
      STATE_TITLE: FYI historical backfill state (${{ inputs.state_label || 'fyi-backfill-state' }})
      DISPATCH_DELAY_SECONDS: "0"
      WORKER_CHUNK_SIZE: ${{ inputs.worker_chunk_size || '50' }}
      WORKER_MAX_CHUNKS: ${{ inputs.worker_max_chunks || '10' }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"

      - name: Load persisted controller state
        run: |
          set -euo pipefail
          mkdir -p .tmp
          gh label create "$STATE_LABEL" \
            --repo "$REPO" \
            --description "State for automated FYI historical backfill" \
            --color "5319e7" \
            --force
          gh issue list \
            --repo "$REPO" \
            --label "$STATE_LABEL" \
            --state open \
            --limit 100 \
            --json number,title \
            > .tmp/backfill-state-issues.json
          issue_number="$(
            python - <<'PY'
          import json
          import os
          from pathlib import Path

          state_title = os.environ["STATE_TITLE"]
          issues = json.loads(Path(".tmp/backfill-state-issues.json").read_text(encoding="utf-8"))
          for issue in issues:
              if issue.get("title") == state_title:
                  print(issue["number"])
                  break
          PY
          )"
          if [ -n "$issue_number" ]; then
            gh issue view "$issue_number" --repo "$REPO" --json body --jq '.body' \
              > .tmp/backfill-state.json
          else
            printf '{"next_id": %s, "dispatch_next_id": %s, "summary": {}, "batches": [], "dispatched": []}\n' "$ID_FROM" "$ID_FROM" > .tmp/backfill-state.json
            issue_url="$(
              gh issue create \
                --repo "$REPO" \
                --title "$STATE_TITLE" \
                --label "$STATE_LABEL" \
                --body-file .tmp/backfill-state.json
            )"
            issue_number="${issue_url##*/}"
            printf '%s\n' "$issue_url" > .tmp/backfill-state-issue-url.txt
            if [ -z "$issue_number" ] || [ "$issue_number" = "$issue_url" ]; then
              echo "Could not parse created state issue URL: $issue_url"
              exit 1
            fi
          fi
          echo "$issue_number" > .tmp/backfill-state-issue-number.txt
          python - <<'PY'
          import json
          from pathlib import Path
          import sys

          sys.path.insert(0, str(Path("scripts")))

          from backfill_state import prepare_backfill_state

          state_path = Path(".tmp/backfill-state.json")
          state = json.loads(state_path.read_text(encoding="utf-8"))
          compact = prepare_backfill_state(state)
          state_path.write_text(json.dumps(compact, indent=2, sort_keys=True) + "\n", encoding="utf-8")
          PY
          cat .tmp/backfill-state.json

      - name: Determine controller batch cap
        run: |
          set -euo pipefail
          python - <<'PY'
          import os

          requested = os.environ.get("TARGET_ACTIVE_WORKERS_INPUT", "").strip()
          if requested:
              active_target = int(requested)
              window = "manual"
          else:
              active_target = int(os.environ["TARGET_ACTIVE_WORKERS_DEFAULT"])
              window = "scheduled"
          queue_buffer = int(os.environ["TARGET_QUEUE_BUFFER"])
          total_target = active_target + queue_buffer

          with open(os.environ["GITHUB_ENV"], "a", encoding="utf-8") as env_file:
              env_file.write(f"TARGET_ACTIVE_WORKERS_EFFECTIVE={active_target}\n")
              env_file.write(f"TARGET_TOTAL_WORKERS_EFFECTIVE={total_target}\n")
              env_file.write(f"MAX_BATCH_WINDOW={window}\n")

          print(f"Using target_active_workers={active_target} and total_target={total_target} ({window})")
          PY

      - name: Check active worker runs
        run: |
          set -euo pipefail
          queued="$(
            gh run list \
              --repo "$REPO" \
              --workflow "Historical Backfill Batch" \
              --status queued \
              --limit 100 \
              --json databaseId \
              --jq 'length'
          )"
          in_progress="$(
            gh run list \
              --repo "$REPO" \
              --workflow "Historical Backfill Batch" \
              --status in_progress \
              --limit 100 \
              --json databaseId \
              --jq 'length'
          )"
          active=$((queued + in_progress))
          echo "ACTIVE_WORKER_RUNS=$active" >> "$GITHUB_ENV"
          echo "Active Historical Backfill Batch runs: $active"

      - name: Determine dispatch slots
        run: |
          set -euo pipefail
          available=$((TARGET_TOTAL_WORKERS_EFFECTIVE - ACTIVE_WORKER_RUNS))
          if [ "$available" -lt 0 ]; then
            available=0
          fi
          echo "AVAILABLE_BATCHES=$available" >> "$GITHUB_ENV"
          echo "Available dispatch slots: $available"

      - name: Plan worker dispatches
        run: |
          set -euo pipefail
          if [ "${AVAILABLE_BATCHES:-0}" -le 0 ]; then
            cat > .tmp/backfill-plan.json <<EOF
          {
            "batches": [],
            "blocked_by_active_workers": true,
            "complete": false,
            "next_id": $(jq '.next_id // 1' .tmp/backfill-state.json),
            "planned_count": 0
          }
          EOF
            cat .tmp/backfill-plan.json
            exit 0
          fi
          python scripts/plan_auto_backfill.py \
            --id-from "$ID_FROM" \
            --id-to "$ID_TO" \
            --batch-span "$BATCH_SPAN" \
            --max-batches "$AVAILABLE_BATCHES" \
            --state .tmp/backfill-state.json \
            --output .tmp/backfill-plan.json
          cat .tmp/backfill-plan.json

      - name: Dispatch worker workflows
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          if [ "$(jq '.planned_count' .tmp/backfill-plan.json)" = "0" ]; then
            if [ "$(jq -r '.blocked_by_active_workers // false' .tmp/backfill-plan.json)" = "true" ]; then
              echo "Historical Backfill Batch runs are already active; not dispatching new work"
            else
              echo "No worker batches to dispatch"
            fi
            exit 0
          fi
          jq -c '.batches[]' .tmp/backfill-plan.json | while read -r batch; do
            id_from="$(jq -r '.id_from' <<<"$batch")"
            id_to="$(jq -r '.id_to' <<<"$batch")"
            label="$(jq -r '.label' <<<"$batch")"
            echo "Dispatching historical_backfill_batch.yml for $label"
            gh workflow run historical_backfill_batch.yml \
              --ref "$REF_NAME" \
              -f id_from="$id_from" \
              -f id_to="$id_to" \
              -f chunk_size="$WORKER_CHUNK_SIZE" \
              -f max_chunks="$WORKER_MAX_CHUNKS" \
              -f max_requests_per_chunk="$MAX_REQUESTS_PER_CHUNK" \
              -f max_runtime_minutes="$MAX_RUNTIME_MINUTES" \
              -f max_disk_gb="$MAX_DISK_GB" \
              -f dry_run="$DRY_RUN"
            if [ "${DISPATCH_DELAY_SECONDS:-0}" -gt 0 ]; then
              sleep "$DISPATCH_DELAY_SECONDS"
            fi
          done

      - name: Persist controller state
        env:
          ISSUE_NUMBER_PATH: .tmp/backfill-state-issue-number.txt
          REPO: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          if [ "$(jq '.planned_count' .tmp/backfill-plan.json)" = "0" ]; then
            echo "No state update required"
            exit 0
          fi
          issue_number="$(cat "$ISSUE_NUMBER_PATH")"
          python - <<'PY'
          import json
          import os
          from datetime import UTC, datetime
          from pathlib import Path
          import sys

          sys.path.insert(0, str(Path("scripts")))

          from backfill_state import append_pending_batches

          state_path = Path(".tmp/backfill-state.json")
          plan_path = Path(".tmp/backfill-plan.json")
          state = json.loads(state_path.read_text(encoding="utf-8"))
          plan = json.loads(plan_path.read_text(encoding="utf-8"))
          updated = append_pending_batches(
              state=state,
              batches=plan["batches"],
              controller_run_id=os.environ["RUN_ID"],
              controller_run_url=os.environ["RUN_URL"],
          )
          updated["complete"] = False
          updated["dispatched"] = list(state.get("dispatched") or [])
          updated["dispatched"].append(
              {
                  "at": datetime.now(UTC).isoformat(),
                  "batches": plan["batches"],
                  "controller_run_id": os.environ["RUN_ID"],
                  "controller_run_url": os.environ["RUN_URL"],
              }
          )
          updated["id_from"] = int(os.environ["ID_FROM"])
          updated["id_to"] = int(os.environ["ID_TO"])
          from backfill_state import prepare_backfill_state

          payload_state = prepare_backfill_state(updated)
          payload = json.dumps(payload_state, indent=2, sort_keys=True) + "\n"
          state_path.write_text(payload, encoding="utf-8")
          Path(".tmp/backfill-state.json").write_text(payload, encoding="utf-8")
          PY
          gh issue edit "$issue_number" \
            --repo "$REPO" \
            --body-file .tmp/backfill-state.json

      - name: Upload controller plan
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: automated-backfill-plan
          path: |
            .tmp/backfill-plan.json
            .tmp/backfill-state.json
