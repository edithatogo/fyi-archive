name: Docs Lint

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  markdown:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: markdownlint-cli2
        run: |
          set -euo pipefail
          npx --yes markdownlint-cli2@0.18.1 --config .markdownlint.json "docs/**/*.md" "*.md" "!CHANGELOG.md"

  vale:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Vale
        run: |
          set -euo pipefail
          VALE_VERSION=3.15.1
          mkdir -p /tmp/vale
          curl -sSL "https://github.com/errata-ai/vale/releases/download/v${VALE_VERSION}/vale_${VALE_VERSION}_Linux_64-bit.tar.gz" -o /tmp/vale.tar.gz
          tar -xzf /tmp/vale.tar.gz -C /tmp/vale
          /tmp/vale/vale --config=.vale.ini docs README.md DATASET_CARD.md RELEASE_NOTES.md CONTRIBUTING.md SECURITY.md
