name: Release

on:
  push:
    branches: [main]

permissions:
  attestations: write
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          set -euo pipefail
          uv sync --extra dev --frozen

      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          release-type: python
          package-name: fyi_archive
          component: ""

      - name: Generate release evidence
        if: steps.release.outputs.releases_created == 'true'
        run: |
          set -euo pipefail
          uv run python scripts/gen_sbom.py
          uv run python scripts/gen_provenance.py \
            --artifact dist/sbom.cdx.json \
            --artifact dist/*.wacz \
            --artifact dist/*.duckdb \
            --artifact manifests/latest_manifest.json

      - name: Upload release evidence
        if: steps.release.outputs.releases_created == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: release-evidence
          path: |
            dist/sbom.cdx.json
            dist/provenance.json

      - name: Attest release evidence
        if: steps.release.outputs.releases_created == 'true'
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: |
            dist/sbom.cdx.json
            dist/provenance.json

      - name: Comment on PR (dry-run)
        if: steps.release.outputs.releases_created == 'true'
        run: |
          echo "Release ${{ steps.release.outputs.tag_name }} created"
