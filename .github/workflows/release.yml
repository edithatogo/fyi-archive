name: Release

on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      attestations: write
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@94527f2e458b27549849d47d273a16bec83a01e9 # v7
        with:
          enable-cache: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          set -euo pipefail
          uv sync --extra dev --frozen

      - uses: googleapis/release-please-action@5c625bfb5d1ff62eadeeb3772007f7f66fdcf071 # v4
        id: release
        with:
          token: ${{ secrets.WORKFLOW_PAT }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      - name: Generate release evidence
        if: steps.release.outputs.releases_created == 'true'
        run: |
          set -euo pipefail
          uv run python scripts/gen_sbom.py
          uv run python scripts/gen_provenance.py \
            --artifact dist/sbom.cdx.json \
            --artifact 'dist/*.wacz' \
            --artifact 'dist/*.duckdb' \
            --artifact manifests/latest_manifest.json

      - name: Upload release evidence
        if: steps.release.outputs.releases_created == 'true'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: release-evidence
          path: |
            dist/sbom.cdx.json
            dist/provenance.json

      - name: Attach release evidence
        if: steps.release.outputs.releases_created == 'true'
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          token: ${{ secrets.WORKFLOW_PAT }}
          tag_name: ${{ steps.release.outputs.tag_name }}
          fail_on_unmatched_files: false
          files: |
            dist/sbom.cdx.json
            dist/provenance.json

      - name: Attest release evidence
        if: steps.release.outputs.releases_created == 'true'
        uses: actions/attest-build-provenance@78e6cbd37d0ac1a40113c04f2037dacf1ea3f12e # v4
        with:
          subject-path: |
            dist/sbom.cdx.json
            dist/provenance.json

      - name: Comment on PR (dry-run)
        if: steps.release.outputs.releases_created == 'true'
        env:
          RELEASE_TAG: ${{ steps.release.outputs.tag_name }}
        run: |
          echo "Release ${RELEASE_TAG} created"
