name: Code quality and security tooling

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  python-quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@94527f2e458b27549849d47d273a16bec83a01e9 # v7
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          set -euo pipefail
          uv sync --extra dev --frozen
      - name: Ruff lint
        run: |
          set -euo pipefail
          uv run ruff check .
      - name: Ruff format
        run: |
          set -euo pipefail
          uv run ruff format --check .
      - name: basedpyright strict type-check baseline
        continue-on-error: true
        run: |
          set -euo pipefail
          uv run basedpyright
      - name: ty strict type check
        run: |
          set -euo pipefail
          uv run ty check src tests scripts
      - name: Version and release consistency
        run: |
          set -euo pipefail
          uv run python scripts/check_version_consistency.py
      - name: Gentle archive pacing defaults
        run: |
          set -euo pipefail
          uv run python scripts/check_politeness_defaults.py

  repository-quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - name: Typos
        uses: crate-ci/typos@37bb98842b0d8c4ffebdb75301a13db0267cef89 # v1.47.2
      - name: Set up Taplo
        uses: uncenter/setup-taplo@b18c8c8302695fe63d6853bc004006215ac52b91 # v2
        with:
          version: "0.10.0"
      - name: Taplo format
        run: |
          set -euo pipefail
          taplo fmt --check pyproject.toml
      - name: actionlint
        uses: raven-actions/actionlint@3d39aea434753780c3b3d4a1a31c854b4dbf49d7 # v2
        with:
          shellcheck: false

  zizmor-advisory:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - name: Zizmor workflow security audit
        continue-on-error: true
        uses: zizmorcore/zizmor-action@5f14fd08f7cf1cb1609c1e344975f152c7ee938d # v0.5.6
        with:
          advanced-security: false
          online-audits: false
          inputs: .github/workflows

  ruff-preview:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@94527f2e458b27549849d47d273a16bec83a01e9 # v7
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: uv sync --extra dev --frozen
      - name: Ruff preview lint
        run: uv run ruff check --preview .
      - name: Ruff preview format
        run: uv run ruff format --preview --check .
