name: Historical Seed

on:
  workflow_dispatch:
    inputs:
      date_from:
        description: Inclusive window start date
        required: false
        type: string
      date_to:
        description: Inclusive window end date
        required: false
        type: string
      id_from:
        description: First FYI request ID for backfill discovery
        required: true
        default: "1"
        type: string
      id_to:
        description: Last FYI request ID for backfill discovery
        required: true
        default: "20000"
        type: string
      max_requests:
        description: Maximum requests to process
        required: true
        default: "50"
        type: string
      max_bytes:
        description: Maximum bytes to write
        required: false
        type: string
      max_runtime_minutes:
        description: Maximum runtime in minutes
        required: true
        default: "30"
        type: string
      max_disk_gb:
        description: Minimum free disk budget in GiB
        required: true
        default: "5"
        type: string
      min_interval:
        description: Minimum seconds between requests to the same host
        required: true
        default: "2.0"
        type: string
      concurrency:
        description: Max concurrent in-flight requests to the site
        required: true
        default: "1"
        type: string
      instance:
        description: Archive instance id (nz-fyi, au-rtk, uk-wdtk, ie-myrighttoknow)
        required: true
        default: "nz-fyi"
        type: string
      dry_run:
        description: Use deterministic dry-run records instead of fyi-cli capture
        required: true
        default: true
        type: boolean

permissions:
  contents: read

jobs:
  seed:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@94527f2e458b27549849d47d273a16bec83a01e9 # v7
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          set -euo pipefail
          uv sync --extra dev --frozen

      - name: Disk precheck
        run: |
          set -euo pipefail
          df -h .

      - name: Enumerate AU authority bodies via fyi-cli
        if: ${{ inputs.dry_run == false && inputs.instance == 'au-rtk' }}
        env:
          INSTANCE: ${{ inputs.instance }}
          MIN_INTERVAL: ${{ inputs.min_interval }}
        run: |
          set -euo pipefail
          uv run fyi-archive discover bodies \
            --instance "$INSTANCE" \
            --delay-seconds "$MIN_INTERVAL" \
            --output data/_state/discovered_bodies.json \
            --shared-rate-limit-db data/_state/fyi-cli.db

      - name: Run historical seed
        env:
          CONCURRENCY: ${{ inputs.concurrency }}
          DATE_FROM: ${{ inputs.date_from }}
          DATE_TO: ${{ inputs.date_to }}
          DRY_RUN: ${{ inputs.dry_run }}
          ID_FROM: ${{ inputs.id_from }}
          ID_TO: ${{ inputs.id_to }}
          INSTANCE: ${{ inputs.instance }}
          MAX_BYTES: ${{ inputs.max_bytes }}
          MAX_DISK_GB: ${{ inputs.max_disk_gb }}
          MAX_REQUESTS: ${{ inputs.max_requests }}
          MAX_RUNTIME_MINUTES: ${{ inputs.max_runtime_minutes }}
          MIN_INTERVAL: ${{ inputs.min_interval }}
        run: |
          set -euo pipefail
          args=(
            --instance "$INSTANCE"
            --date-from "$DATE_FROM"
            --date-to "$DATE_TO"
            --max-requests "$MAX_REQUESTS"
            --max-runtime-minutes "$MAX_RUNTIME_MINUTES"
            --max-disk-gb "$MAX_DISK_GB"
            --min-interval "$MIN_INTERVAL"
            --concurrency "$CONCURRENCY"
          )
          if [ -n "$MAX_BYTES" ]; then
            args+=(--max-bytes "$MAX_BYTES")
          fi
          if [ "$DRY_RUN" = "true" ]; then
            args+=(--dry-run)
          else
            mkdir -p data/_state
            discovered=false
            for attempt in 1 2 3; do
              if uv run fyi discover \
                --backfill-ids \
                --id-from "$ID_FROM" \
                --id-to "$ID_TO" \
                --output data/_state/discovered_requests.jsonl; then
                discovered=true
                break
              fi
              [ "$attempt" = "3" ] && break
              sleep $((attempt * 20))
            done
            if [ "$discovered" = "true" ]; then
              args+=(--requests-file data/_state/discovered_requests.jsonl)
            else
              args+=(--id-from "$ID_FROM" --id-to "$ID_TO" --allow-undiscovered)
            fi
          fi
          uv run fyi-archive seed run "${args[@]}"

      - name: Record capture output diagnostics
        if: ${{ always() }}
        run: |
          set +e
          echo "Capture output tree:"
          find data -maxdepth 6 -type f -print 2>/dev/null | sort || true
          echo "Request JSON summaries:"
          python - <<'PY'
          import json
          from pathlib import Path

          for path in sorted(Path("data/raw/requests").glob("**/request.json")):
              try:
                  payload = json.loads(path.read_text(encoding="utf-8"))
                  print(json.dumps({"path": str(path), "keys": sorted(payload), "id": payload.get("id"), "request_id": payload.get("request_id")}, sort_keys=True))
              except Exception as error:  # noqa: BLE001 - diagnostic step must continue
                  print(json.dumps({"path": str(path), "error": str(error)}, sort_keys=True))
          PY

      - name: Upload capture diagnostics
        if: ${{ always() }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: historical-seed-capture-diagnostics
          if-no-files-found: ignore
          path: |
            data/raw/requests/**
            data/warc/**
            data/attachments/**
            data/_state/ledger.jsonl

      - name: Build manifest
        env:
          DRY_RUN: ${{ inputs.dry_run }}
          INSTANCE: ${{ inputs.instance }}
          MAX_REQUESTS: ${{ inputs.max_requests }}
        run: |
          set -euo pipefail
          manifest_derived_dir=data/derived/requests
          if [ "$DRY_RUN" != "true" ]; then
            manifest_derived_dir=data/raw/requests
          fi
          uv run fyi-archive manifest build \
            --instance "$INSTANCE" \
            --derived-dir "$manifest_derived_dir" \
            --fyi-cli-version 1.2.0
          uv run python -m json.tool manifests/latest_manifest.json > /dev/null
          if [ "$MAX_REQUESTS" != "0" ]; then
            uv run python - <<'PY'
          import json
          from pathlib import Path

          manifest = json.loads(Path("manifests/latest_manifest.json").read_text())
          if manifest["meta"]["record_count"] < 1:
              raise SystemExit("historical seed manifest is empty")
          PY
          fi

      - name: Generate provenance
        env:
          DATE_FROM: ${{ inputs.date_from }}
          DATE_TO: ${{ inputs.date_to }}
        run: |
          set -euo pipefail
          uv run python scripts/gen_provenance.py \
            --artifact manifests/latest_manifest.json \
            --artifact manifests/latest_manifest.parquet \
            --artifact manifests/authorities.json \
            --fetch-start "$DATE_FROM" \
            --fetch-end "$DATE_TO" \
            --fetch-label historical-seed

      - name: Upload seed artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: historical-seed
          path: |
            data/_state/ledger.jsonl
            data/_state/discovered_bodies.json
            data/_state/fyi-cli.db
            data/derived/requests/*.json
            manifests/latest_manifest.json
            manifests/latest_manifest.parquet
            manifests/authorities.json
            dist/provenance.json
