name: Project sync

on:
  workflow_dispatch:
  schedule:
    - cron: "17 4 * * *"

permissions:
  contents: read
  issues: none
  pull-requests: none

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"

      - name: Sync RIOPA umbrella project
        env:
          GH_TOKEN: ${{ secrets.RIOPA_PROJECT_TOKEN }}
        run: |
          python scripts/sync_github_projects.py --apply --status-update --report-output project_sync_report.json
          cat project_sync_report.json
