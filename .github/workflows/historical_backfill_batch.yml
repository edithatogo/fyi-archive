name: Historical Backfill Batch

on:
  workflow_dispatch:
    inputs:
      id_from:
        description: First FYI request ID for the batch
        required: true
        default: "1"
        type: string
      id_to:
        description: Last FYI request ID for the batch
        required: true
        default: "20000"
        type: string
      chunk_size:
        description: Inclusive request-ID span per job
        required: true
        default: "100"
        type: string
      max_chunks:
        description: Maximum chunks to run from this batch
        required: true
        default: "1"
        type: string
      max_requests_per_chunk:
        description: Maximum captured requests per chunk
        required: true
        default: "10"
        type: string
      max_runtime_minutes:
        description: Maximum runtime per chunk
        required: true
        default: "60"
        type: string
      min_interval:
        description: Minimum seconds between requests to the same host
        required: true
        default: "2.0"
        type: string
      concurrency:
        description: Max concurrent in-flight requests to the site
        required: true
        default: "1"
        type: string
      instance:
        description: Archive instance id (nz-fyi, au-rtk, uk-wdtk, ie-myrighttoknow)
        required: true
        default: "nz-fyi"
        type: string
      max_disk_gb:
        description: Minimum free disk budget in GiB
        required: true
        default: "5"
        type: string
      max_parallel:
        description: Maximum chunk jobs to run in parallel
        required: true
        default: "1"
        type: string
      dry_run:
        description: Use deterministic dry-run records instead of fyi-cli capture
        required: true
        default: true
        type: boolean

permissions:
  contents: read

jobs:
  plan:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.plan.outputs.matrix }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
      - id: plan
        name: Plan chunks
        env:
          CHUNK_SIZE: ${{ inputs.chunk_size }}
          ID_FROM: ${{ inputs.id_from }}
          ID_TO: ${{ inputs.id_to }}
          MAX_CHUNKS: ${{ inputs.max_chunks }}
        run: |
          set -euo pipefail
          matrix="$(python scripts/plan_backfill_chunks.py \
            --id-from "$ID_FROM" \
            --id-to "$ID_TO" \
            --chunk-size "$CHUNK_SIZE" \
            --max-chunks "$MAX_CHUNKS")"
          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"
          echo "$matrix"

  seed:
    needs: plan
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      max-parallel: ${{ fromJSON(inputs.max_parallel) }}
      matrix: ${{ fromJson(needs.plan.outputs.matrix) }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@94527f2e458b27549849d47d273a16bec83a01e9 # v7
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --extra dev --frozen

      - name: Run historical seed chunk
        env:
          CONCURRENCY: ${{ inputs.concurrency }}
          DRY_RUN: ${{ inputs.dry_run }}
          ID_FROM: ${{ matrix.id_from }}
          ID_TO: ${{ matrix.id_to }}
          INSTANCE: ${{ inputs.instance }}
          MAX_DISK_GB: ${{ inputs.max_disk_gb }}
          MAX_REQUESTS: ${{ inputs.max_requests_per_chunk }}
          MAX_RUNTIME_MINUTES: ${{ inputs.max_runtime_minutes }}
          MIN_INTERVAL: ${{ inputs.min_interval }}
        run: |
          set -euo pipefail
          args=(
            --instance "$INSTANCE"
            --max-requests "$MAX_REQUESTS"
            --max-runtime-minutes "$MAX_RUNTIME_MINUTES"
            --max-disk-gb "$MAX_DISK_GB"
            --min-interval "$MIN_INTERVAL"
            --concurrency "$CONCURRENCY"
            --continue-on-error
          )
          if [ "$DRY_RUN" = "true" ]; then
            mkdir -p data/_state
            uv run python - <<'PY'
          import json
          import os
          from pathlib import Path

          id_from = int(os.environ["ID_FROM"])
          id_to = int(os.environ["ID_TO"])
          output = Path("data/_state/discovered_requests.jsonl")
          with output.open("w", encoding="utf-8") as handle:
              for request_id in range(id_from, id_to + 1):
                  handle.write(
                      json.dumps(
                          {
                              "request_id": request_id,
                              "url_title": f"dry-run-request-{request_id}",
                              "title": f"Dry-run backfill request {request_id}",
                              "authority": "",
                          },
                          sort_keys=True,
                      )
                      + "\n"
                  )
          PY
            args+=(--requests-file data/_state/discovered_requests.jsonl --dry-run)
          else
            mkdir -p data/_state
            discovered=false
            for attempt in 1 2 3; do
              if uv run fyi discover \
                --backfill-ids \
                --id-from "$ID_FROM" \
                --id-to "$ID_TO" \
                --output data/_state/discovered_requests.jsonl; then
                discovered=true
                break
              fi
              [ "$attempt" = "3" ] && break
              sleep $((attempt * 20))
            done
            if [ "$discovered" = "true" ] && [ ! -s data/_state/discovered_requests.jsonl ]; then
              echo "Live discovery returned an empty queue; resolving canonical request slugs from the public HF manifest"
              uv run python - <<'PY'
          import json
          import os
          from pathlib import Path

          from huggingface_hub import hf_hub_download

          manifest_path = hf_hub_download(
              repo_id="edithatogo/fyi-archive-nz",
              filename="manifests/latest_manifest.json",
              repo_type="dataset",
          )
          manifest = json.loads(Path(manifest_path).read_text(encoding="utf-8"))
          id_from = int(os.environ["ID_FROM"])
          id_to = int(os.environ["ID_TO"])
          output = Path("data/_state/discovered_requests.jsonl")
          rows = []
          for request in manifest.get("requests", []):
              request_id = request.get("request_id")
              if isinstance(request_id, int) and id_from <= request_id <= id_to:
                  rows.append(
                      {
                          "request_id": request_id,
                          "url_title": request.get("url_title") or f"request-{request_id}",
                          "title": request.get("title") or "",
                          "authority": request.get("authority") or "",
                      }
                  )
          rows.sort(key=lambda row: row["request_id"])
          output.write_text(
              "".join(json.dumps(row, sort_keys=True) + "\n" for row in rows),
              encoding="utf-8",
          )
          print(f"Resolved {len(rows)} canonical request(s) from HF manifest")
          PY
            fi
            if [ "$discovered" = "true" ]; then
              if [ -s data/_state/discovered_requests.jsonl ]; then
                args+=(--requests-file data/_state/discovered_requests.jsonl)
              else
                args+=(--id-from "$ID_FROM" --id-to "$ID_TO" --allow-undiscovered)
              fi
            else
              args+=(--id-from "$ID_FROM" --id-to "$ID_TO" --allow-undiscovered)
            fi
          fi
          uv run fyi-archive seed run "${args[@]}"

      - name: Validate live capture output
        if: ${{ inputs.dry_run == false }}
        run: |
          set -euo pipefail
          if [ ! -s data/_state/ledger.jsonl ]; then
            echo "Live seed produced no ledger evidence" >&2
            exit 1
          fi
          if grep -q '"status": "failed"' data/_state/ledger.jsonl; then
            echo "Live seed recorded one or more failed captures; refusing derived export" >&2
            exit 1
          fi
          if [ ! -d data/raw/requests ]; then
            echo "Live seed produced no raw request store" >&2
            exit 1
          fi

      - name: Build chunk manifest
        env:
          DRY_RUN: ${{ inputs.dry_run }}
          INSTANCE: ${{ inputs.instance }}
          MAX_REQUESTS: ${{ inputs.max_requests_per_chunk }}
        run: |
          set -euo pipefail
          manifest_derived_dir=data/derived/requests
          if [ "$DRY_RUN" != "true" ]; then
            manifest_derived_dir=data/raw/requests
          fi
          uv run fyi-archive manifest build \
            --instance "$INSTANCE" \
            --derived-dir "$manifest_derived_dir" \
            --fyi-cli-version 1.2.0
          uv run python -m json.tool manifests/latest_manifest.json > /dev/null
          if [ "$MAX_REQUESTS" != "0" ]; then
            uv run python - <<'PY'
          import json
          from pathlib import Path

          manifest = json.loads(Path("manifests/latest_manifest.json").read_text())
          if manifest["meta"]["record_count"] < 1:
              print("historical backfill chunk manifest is empty; see data/_state/ledger.jsonl")
          PY
          fi

      - name: Generate chunk provenance
        run: |
          set -euo pipefail
          uv run python scripts/gen_provenance.py \
            --artifact manifests/latest_manifest.json \
            --artifact manifests/latest_manifest.parquet \
            --artifact manifests/authorities.json \
            --fetch-start "${{ matrix.id_from }}" \
            --fetch-end "${{ matrix.id_to }}" \
            --fetch-label "historical-backfill-${{ matrix.label }}"

      - name: Export chunk process events
        env:
          DRY_RUN: ${{ inputs.dry_run }}
        run: |
          set -euo pipefail
          derived_dir=data/derived/requests
          if [ "$DRY_RUN" != "true" ]; then
            derived_dir=data/raw/requests
          fi
          mkdir -p dist/process-events
          captured_at="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          uv run fyi export-process-events \
            --derived-dir "$derived_dir" \
            --output dist/process-events/events.jsonl \
            --captured-at "$captured_at"

      - name: Build and verify chunk process projection
        env:
          SNAPSHOT_REVISION: historical-backfill-${{ matrix.label }}
        run: |
          set -euo pipefail
          uv run fyi-archive process project \
            --events dist/process-events/events.jsonl \
            --manifest manifests/latest_manifest.json \
            --output-dir dist/process-events/projection \
            --snapshot-revision "$SNAPSHOT_REVISION"
          uv run fyi-archive process verify \
            --output-dir dist/process-events/projection

      - name: Upload chunk artifacts
        if: ${{ always() }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: historical-backfill-${{ matrix.label }}
          path: |
            data/_state/ledger.jsonl
            data/derived/requests/*.json
            data/raw/requests/**
            manifests/latest_manifest.json
            manifests/latest_manifest.parquet
            manifests/authorities.json
            dist/provenance.json
            dist/process-events/**
          if-no-files-found: warn
