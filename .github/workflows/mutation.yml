name: Mutation testing

on:
  workflow_dispatch:
  schedule:
    - cron: "17 3 * * 6"

permissions:
  contents: read

jobs:
  mutmut:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: astral-sh/setup-uv@94527f2e458b27549849d47d273a16bec83a01a9 # v7
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: uv sync --extra dev --frozen
      - name: Run mutation testing
        run: uv run mutmut run --paths-to-mutate src/fyi_archive --tests-dir tests --max-children 2
      - name: Publish mutation report
        if: always()
        run: uv run mutmut results
