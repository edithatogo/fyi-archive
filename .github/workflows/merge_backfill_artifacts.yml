name: Merge Backfill Artifacts

on:
  workflow_run:
    workflows: ["Historical Backfill Batch"]
    types: [completed]
  workflow_dispatch:
    inputs:
      state_label:
        description: GitHub issue label used to persist controller state
        required: true
        default: "fyi-backfill-state"
        type: string
      dry_run:
        description: Merge artifacts without updating controller state
        required: true
        default: false
        type: boolean
      run_id:
        description: Historical Backfill Batch run ID to merge
        required: false
        type: string
      run_ids:
        description: Historical Backfill Batch run IDs to merge, separated by commas, spaces, or newlines
        required: false
        type: string

permissions:
  actions: read
  contents: read
  issues: write

jobs:
  merge:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
      DRY_RUN: ${{ inputs.dry_run || false }}
      STATE_LABEL: ${{ inputs.state_label || 'fyi-backfill-state' }}
      SOURCE_RUN_ID: ${{ inputs.run_id || github.event.workflow_run.id }}
      SOURCE_RUN_IDS: ${{ inputs.run_ids || inputs.run_id || github.event.workflow_run.id }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@94527f2e458b27549849d47d273a16bec83a01e9 # v7
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --extra dev --frozen

      - name: Download backfill artifacts
        env:
          GH_TOKEN: ${{ github.token }}
          RUN_IDS: ${{ env.SOURCE_RUN_IDS }}
        run: |
          set -euo pipefail
          mkdir -p .tmp/backfill-artifacts
          python - <<'PY'
          import re
          import os
          from pathlib import Path

          raw_run_ids = os.environ["RUN_IDS"]
          run_ids = [part for part in re.split(r"[\s,]+", raw_run_ids.strip()) if part]
          if not run_ids:
              raise SystemExit("No source run IDs were provided")
          Path(".tmp/source-run-ids.txt").write_text("\n".join(run_ids) + "\n", encoding="utf-8")
          PY
          while IFS= read -r run_id; do
            [ -n "$run_id" ] || continue
            mkdir -p ".tmp/backfill-artifacts/$run_id"
            gh run download "$run_id" \
              --pattern 'historical-backfill-*' \
              --dir ".tmp/backfill-artifacts/$run_id"
          done < .tmp/source-run-ids.txt

      - name: Load persisted controller state
        env:
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          mkdir -p .tmp
          issue_number="$(
            gh issue list \
              --repo "$REPO" \
              --label "$STATE_LABEL" \
              --state open \
              --limit 1 \
              --json number \
              --jq '.[0].number // ""'
          )"
          if [ -z "$issue_number" ]; then
            echo "Could not find open backfill state issue for label $STATE_LABEL"
            exit 1
          fi
          echo "$issue_number" > .tmp/backfill-state-issue-number.txt
          gh issue view "$issue_number" --repo "$REPO" --json body --jq '.body' \
            > .tmp/backfill-state.json
          python - <<'PY'
          import json
          from pathlib import Path
          import sys

          sys.path.insert(0, str(Path("src")))

          from fyi_archive.backfill_state_codec import decode_state

          state_file = Path(".tmp/backfill-state.json")
          body = state_file.read_text(encoding="utf-8")
          state_file.write_text(json.dumps(decode_state(body), indent=2, sort_keys=True) + "\n", encoding="utf-8")
          PY
          python - <<'PY'
          import json
          from pathlib import Path
          import sys

          sys.path.insert(0, str(Path("scripts")))

          from backfill_state import controller_labels_from_chunk_labels

          chunks_by_run: dict[str, list[str]] = {}
          controller_labels: list[str] = []
          counts: dict[str, int] = {}
          for run_dir in sorted(Path(".tmp/backfill-artifacts").iterdir()):
              if not run_dir.is_dir():
                  continue
              chunk_labels: list[str] = []
              record_count = 0
              for manifest_path in sorted(run_dir.glob("historical-backfill-*/manifests/latest_manifest.json")):
                  artifact_label = manifest_path.parents[1].name.removeprefix("historical-backfill-")
                  chunk_labels.append(artifact_label)
                  manifest = json.loads(manifest_path.read_text(encoding="utf-8"))
                  record_count += int(manifest.get("meta", {}).get("record_count") or 0)
              if not chunk_labels:
                  continue
              run_controller_labels = controller_labels_from_chunk_labels(chunk_labels)
              if len(run_controller_labels) != 1:
                  raise SystemExit(f"Expected one controller label for run {run_dir.name}, got {run_controller_labels!r}")
              controller_label = run_controller_labels[0]
              chunks_by_run[run_dir.name] = chunk_labels
              controller_labels.append(controller_label)
              counts[controller_label] = record_count
          if not controller_labels:
              raise SystemExit("No historical backfill artifact labels were found")
          if len(set(controller_labels)) != len(controller_labels):
              duplicates = sorted({label for label in controller_labels if controller_labels.count(label) > 1})
              raise SystemExit(f"Duplicate controller labels found: {duplicates}")
          Path(".tmp/backfill-chunk-labels.json").write_text(
              json.dumps(chunks_by_run, indent=2, sort_keys=True) + "\n",
              encoding="utf-8",
          )
          Path(".tmp/backfill-merged-labels.json").write_text(
              json.dumps(controller_labels, indent=2, sort_keys=True) + "\n",
              encoding="utf-8",
          )
          Path(".tmp/backfill-record-counts.json").write_text(
              json.dumps(counts, indent=2, sort_keys=True) + "\n",
              encoding="utf-8",
          )
          PY

      - name: Merge manifests
        run: |
          set -euo pipefail
          mapfile -t manifests < <(find .tmp/backfill-artifacts -path '*/manifests/latest_manifest.json' | sort)
          if [ "${#manifests[@]}" -lt 1 ]; then
            echo "No chunk manifests were downloaded"
            exit 1
          fi
          args=()
          for manifest in "${manifests[@]}"; do
            args+=(--input-manifest "$manifest")
          done
          uv run fyi-archive manifest merge \
            "${args[@]}" \
            --manifest-path manifests/latest_manifest.json \
            --parquet-path manifests/latest_manifest.parquet \
            --authorities-path manifests/authorities.json \
            --fyi-cli-version 1.2.0
          uv run python - <<'PY'
          import json
          from pathlib import Path

          manifest = json.loads(Path("manifests/latest_manifest.json").read_text())
          print(json.dumps(manifest["meta"], indent=2, sort_keys=True))
          if int(manifest["meta"]["record_count"]) < 0:
              raise SystemExit("merged backfill manifest has an invalid record count")
          PY

      - name: Record batch counts
        run: |
          set -euo pipefail
          uv run python - <<'PY'
          import json
          from pathlib import Path

          manifest = json.loads(Path("manifests/latest_manifest.json").read_text(encoding="utf-8"))
          record_count = int(manifest.get("meta", {}).get("record_count") or 0)
          labels = json.loads(Path(".tmp/backfill-merged-labels.json").read_text(encoding="utf-8"))
          existing_counts = json.loads(Path(".tmp/backfill-record-counts.json").read_text(encoding="utf-8"))
          if sum(int(value) for value in existing_counts.values()) != record_count:
              raise SystemExit("controller batch record counts do not match merged manifest record count")
          counts = {str(label): int(existing_counts[str(label)]) for label in labels}
          Path(".tmp/backfill-record-counts.json").write_text(json.dumps(counts, indent=2, sort_keys=True) + "\n", encoding="utf-8")
          PY

      - name: Merge process event logs
        run: |
          set -euo pipefail
          mkdir -p dist/process-events
          find .tmp/backfill-artifacts -name events.jsonl -type f -print0 \
            | sort -z | xargs -0 cat > dist/process-events/events.jsonl
          if [ ! -s dist/process-events/events.jsonl ]; then
            echo "No process event rows were found; materializing an empty verified projection"
            : > dist/process-events/events.jsonl
          fi
          uv run fyi-archive process project \
            --events dist/process-events/events.jsonl \
            --manifest manifests/latest_manifest.json \
            --output-dir dist/process-events/projection \
            --snapshot-revision "historical-backfill-merge-${GITHUB_RUN_ID}"
          uv run fyi-archive process verify \
            --output-dir dist/process-events/projection

      - name: Generate merge provenance
        env:
          RUN_ID: ${{ github.run_id }}
        run: |
          set -euo pipefail
          uv run python scripts/gen_provenance.py \
            --artifact manifests/latest_manifest.json \
            --artifact manifests/latest_manifest.parquet \
            --artifact manifests/authorities.json \
            --fetch-label "historical-backfill-merge-${RUN_ID}"

      - name: Persist merged backfill state
        if: env.DRY_RUN != 'true'
        env:
          ISSUE_NUMBER_PATH: .tmp/backfill-state-issue-number.txt
          REPO: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          issue_number="$(cat "$ISSUE_NUMBER_PATH")"
          python - <<'PY'
          import json
          import os
          from pathlib import Path
          import sys

          sys.path.insert(0, str(Path("src")))
          sys.path.insert(0, str(Path("scripts")))

          from fyi_archive.backfill_state_codec import state_body_from_state
          from backfill_state import mark_merged_batches

          state_path = Path(".tmp/backfill-state.json")
          merged_labels_path = Path(".tmp/backfill-merged-labels.json")
          state = json.loads(state_path.read_text(encoding="utf-8"))
          merged_labels = json.loads(merged_labels_path.read_text(encoding="utf-8"))
          updated = mark_merged_batches(
              state=state,
              merged_labels=list(merged_labels),
              worker_run_id=os.environ["RUN_ID"],
              worker_run_url=os.environ["RUN_URL"],
              id_to=int(state["id_to"]),
              record_counts_by_label=json.loads(Path(".tmp/backfill-record-counts.json").read_text(encoding="utf-8")),
          )
          state_path.write_text(json.dumps(updated, indent=2, sort_keys=True) + "\n", encoding="utf-8")
          Path(".tmp/backfill-state.body").write_text(state_body_from_state(updated), encoding="utf-8")
          PY
          gh issue edit "$issue_number" \
            --repo "$REPO" \
            --body-file .tmp/backfill-state.body

      - name: Write dry-run merge marker
        if: env.DRY_RUN == 'true'
        run: |
          set -euo pipefail
          uv run python - <<'PY'
          import json
          from pathlib import Path

          manifest = json.loads(Path("manifests/latest_manifest.json").read_text(encoding="utf-8"))
          payload = {
              "chunk_labels": json.loads(Path(".tmp/backfill-chunk-labels.json").read_text(encoding="utf-8")),
              "dry_run": True,
              "source_run_ids": Path(".tmp/source-run-ids.txt").read_text(encoding="utf-8").splitlines(),
              "record_count": int(manifest.get("meta", {}).get("record_count") or 0),
              "record_counts": json.loads(Path(".tmp/backfill-record-counts.json").read_text(encoding="utf-8")),
              "merged_labels": json.loads(Path(".tmp/backfill-merged-labels.json").read_text(encoding="utf-8")),
          }
          Path("dist").mkdir(parents=True, exist_ok=True)
          Path("dist/merge_backfill_dry_run.json").write_text(json.dumps(payload, indent=2, sort_keys=True) + "\n", encoding="utf-8")
          PY

      - name: Upload merged backfill
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: merged-backfill-${{ github.run_id }}
          path: |
            manifests/latest_manifest.json
            manifests/latest_manifest.parquet
            manifests/authorities.json
            dist/provenance.json
            dist/merge_backfill_dry_run.json
            dist/process-events/**
