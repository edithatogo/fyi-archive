name: Merge Backfill Artifacts

on:
  workflow_run:
    workflows: ["Historical Backfill Batch"]
    types: [completed]
  workflow_dispatch:
    inputs:
      state_label:
        description: GitHub issue label used to persist controller state
        required: true
        default: "fyi-backfill-state"
        type: string
      dry_run:
        description: Merge artifacts without updating controller state
        required: true
        default: false
        type: boolean
      run_id:
        description: Historical Backfill Batch run ID to merge
        required: true
        type: string

permissions:
  actions: read
  contents: read
  issues: write

jobs:
  merge:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
      DRY_RUN: ${{ inputs.dry_run || false }}
      STATE_LABEL: ${{ inputs.state_label || 'fyi-backfill-state' }}
      SOURCE_RUN_ID: ${{ inputs.run_id || github.event.workflow_run.id }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@94527f2e458b27549849d47d273a16bec83a01e9 # v7
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --extra dev --frozen

      - name: Download backfill artifacts
        env:
          GH_TOKEN: ${{ github.token }}
          RUN_ID: ${{ env.SOURCE_RUN_ID }}
        run: |
          set -euo pipefail
          mkdir -p .tmp/backfill-artifacts
          gh run download "$RUN_ID" \
            --pattern 'historical-backfill-*' \
            --dir .tmp/backfill-artifacts

      - name: Load persisted controller state
        env:
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          mkdir -p .tmp
          issue_number="$(
            gh issue list \
              --repo "$REPO" \
              --label "$STATE_LABEL" \
              --state open \
              --limit 1 \
              --json number \
              --jq '.[0].number // ""'
          )"
          if [ -z "$issue_number" ]; then
            echo "Could not find open backfill state issue for label $STATE_LABEL"
            exit 1
          fi
          echo "$issue_number" > .tmp/backfill-state-issue-number.txt
          gh issue view "$issue_number" --repo "$REPO" --json body --jq '.body' \
            > .tmp/backfill-state.json
          python - <<'PY'
          import json
          from pathlib import Path
          import sys

          sys.path.insert(0, str(Path("src")))

          from fyi_archive.backfill_state_codec import decode_state

          state_file = Path(".tmp/backfill-state.json")
          body = state_file.read_text(encoding="utf-8")
          state_file.write_text(json.dumps(decode_state(body), indent=2, sort_keys=True) + "\n", encoding="utf-8")
          PY
          gh api "repos/$REPO/actions/runs/$SOURCE_RUN_ID/artifacts" \
            --jq '[.artifacts[].name | select(startswith("historical-backfill-")) | sub("^historical-backfill-"; "")]' \
            > .tmp/backfill-chunk-labels.json
          python - <<'PY'
          import json
          from pathlib import Path
          import sys

          sys.path.insert(0, str(Path("scripts")))

          from backfill_state import controller_labels_from_chunk_labels

          chunk_labels = json.loads(Path(".tmp/backfill-chunk-labels.json").read_text(encoding="utf-8"))
          controller_labels = controller_labels_from_chunk_labels(list(chunk_labels))
          if not controller_labels:
              raise SystemExit("No historical backfill artifact labels were found")
          Path(".tmp/backfill-merged-labels.json").write_text(
              json.dumps(controller_labels, indent=2, sort_keys=True) + "\n",
              encoding="utf-8",
          )
          PY

      - name: Merge manifests
        run: |
          set -euo pipefail
          mapfile -t manifests < <(find .tmp/backfill-artifacts -path '*/manifests/latest_manifest.json' | sort)
          if [ "${#manifests[@]}" -lt 1 ]; then
            echo "No chunk manifests were downloaded"
            exit 1
          fi
          args=()
          for manifest in "${manifests[@]}"; do
            args+=(--input-manifest "$manifest")
          done
          uv run fyi-archive manifest merge \
            "${args[@]}" \
            --manifest-path manifests/latest_manifest.json \
            --parquet-path manifests/latest_manifest.parquet \
            --authorities-path manifests/authorities.json \
            --fyi-cli-version 1.0.0
          uv run python - <<'PY'
          import json
          from pathlib import Path

          manifest = json.loads(Path("manifests/latest_manifest.json").read_text())
          print(json.dumps(manifest["meta"], indent=2, sort_keys=True))
          if int(manifest["meta"]["record_count"]) < 0:
              raise SystemExit("merged backfill manifest has an invalid record count")
          PY

      - name: Record batch counts
        run: |
          set -euo pipefail
          uv run python - <<'PY'
          import json
          from pathlib import Path

          manifest = json.loads(Path("manifests/latest_manifest.json").read_text(encoding="utf-8"))
          record_count = int(manifest.get("meta", {}).get("record_count") or 0)
          labels = json.loads(Path(".tmp/backfill-merged-labels.json").read_text(encoding="utf-8"))
          counts = {str(label): record_count for label in labels}
          Path(".tmp/backfill-record-counts.json").write_text(json.dumps(counts, indent=2, sort_keys=True) + "\n", encoding="utf-8")
          PY

      - name: Generate merge provenance
        env:
          RUN_ID: ${{ env.SOURCE_RUN_ID }}
        run: |
          set -euo pipefail
          uv run python scripts/gen_provenance.py \
            --artifact manifests/latest_manifest.json \
            --artifact manifests/latest_manifest.parquet \
            --artifact manifests/authorities.json \
            --fetch-label "historical-backfill-merge-${RUN_ID}"

      - name: Persist merged backfill state
        if: env.DRY_RUN != 'true'
        env:
          ISSUE_NUMBER_PATH: .tmp/backfill-state-issue-number.txt
          REPO: ${{ github.repository }}
          RUN_ID: ${{ env.SOURCE_RUN_ID }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ env.SOURCE_RUN_ID }}
        run: |
          set -euo pipefail
          issue_number="$(cat "$ISSUE_NUMBER_PATH")"
          python - <<'PY'
          import json
          import os
          from pathlib import Path
          import sys

          sys.path.insert(0, str(Path("src")))
          sys.path.insert(0, str(Path("scripts")))

          from fyi_archive.backfill_state_codec import state_body_from_state
          from backfill_state import mark_merged_batches

          state_path = Path(".tmp/backfill-state.json")
          merged_labels_path = Path(".tmp/backfill-merged-labels.json")
          state = json.loads(state_path.read_text(encoding="utf-8"))
          merged_labels = json.loads(merged_labels_path.read_text(encoding="utf-8"))
          updated = mark_merged_batches(
              state=state,
              merged_labels=list(merged_labels),
              worker_run_id=os.environ["RUN_ID"],
              worker_run_url=os.environ["RUN_URL"],
              id_to=int(state["id_to"]),
              record_counts_by_label=json.loads(Path(".tmp/backfill-record-counts.json").read_text(encoding="utf-8")),
          )
          state_path.write_text(json.dumps(updated, indent=2, sort_keys=True) + "\n", encoding="utf-8")
          Path(".tmp/backfill-state.body").write_text(state_body_from_state(updated), encoding="utf-8")
          PY
          gh issue edit "$issue_number" \
            --repo "$REPO" \
            --body-file .tmp/backfill-state.body

      - name: Write dry-run merge marker
        if: env.DRY_RUN == 'true'
        run: |
          set -euo pipefail
          uv run python - <<'PY'
          import json
          from pathlib import Path

          manifest = json.loads(Path("manifests/latest_manifest.json").read_text(encoding="utf-8"))
          payload = {
              "chunk_labels": json.loads(Path(".tmp/backfill-chunk-labels.json").read_text(encoding="utf-8")),
              "dry_run": True,
              "source_run_id": "${{ env.SOURCE_RUN_ID }}",
              "record_count": int(manifest.get("meta", {}).get("record_count") or 0),
              "merged_labels": json.loads(Path(".tmp/backfill-merged-labels.json").read_text(encoding="utf-8")),
          }
          Path("dist").mkdir(parents=True, exist_ok=True)
          Path("dist/merge_backfill_dry_run.json").write_text(json.dumps(payload, indent=2, sort_keys=True) + "\n", encoding="utf-8")
          PY

      - name: Upload merged backfill
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: merged-backfill-${{ env.SOURCE_RUN_ID }}
          path: |
            manifests/latest_manifest.json
            manifests/latest_manifest.parquet
            manifests/authorities.json
            dist/provenance.json
            dist/merge_backfill_dry_run.json
