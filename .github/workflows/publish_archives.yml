name: Publish Archives

on:
  schedule:
    # Monthly live mirror refresh. Zenodo DOI publication remains manual/gated.
    - cron: "23 3 1 * *"
  workflow_dispatch:
    inputs:
      publication_target:
        description: Mirror target
        required: true
        default: huggingface
        type: choice
        options:
          - huggingface
          - zenodo
          - osf
          - all
          - all_with_osf
      publish:
        description: Publish final Zenodo DOI when target includes Zenodo
        required: true
        default: false
        type: boolean
      confirm:
        description: Type publish-zenodo-doi for production Zenodo DOI publish
        required: false
        type: string
      seed_before_publish:
        description: Build a capped FYI seed bundle before publishing
        required: true
        default: false
        type: boolean
      seed_dry_run:
        description: Use synthetic seed records instead of live fyi-cli capture
        required: true
        default: false
        type: boolean
      seed_id_from:
        description: First FYI request ID for seed discovery
        required: true
        default: "20000"
        type: string
      seed_id_to:
        description: Last FYI request ID for seed discovery
        required: true
        default: "20000"
        type: string
      seed_max_requests:
        description: Maximum requests to capture before publishing
        required: true
        default: "1"
        type: string
      consolidate_backfill_artifacts:
        description: Build the release manifest from successful merged-backfill workflow artifacts before publishing
        required: true
        default: false
        type: boolean
      backfill_merge_run_limit:
        description: Maximum successful merge workflow runs to inspect when consolidating backfill artifacts
        required: true
        default: "500"
        type: string
      dry_run:
        description: Build publication artifacts without remote mirror writes
        required: true
        default: false
        type: boolean
      instance:
        description: Archive instance to publish
        required: true
        default: nz-fyi
        type: string

permissions:
  attestations: write
  contents: read
  id-token: write
  issues: read

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: ${{ inputs.publish && 'zenodo-production' || '' }}
    permissions:
      attestations: write
      contents: read
      id-token: write
      issues: read
    env:
      PUBLICATION_TARGET: ${{ inputs.publication_target || 'huggingface' }}
      DRY_RUN: ${{ inputs.dry_run || false }}
      PUBLISH_ZENODO: ${{ inputs.publish || false }}
      SEED_BEFORE_PUBLISH: ${{ inputs.seed_before_publish || github.event_name == 'schedule' }}
      SEED_DRY_RUN: ${{ inputs.seed_dry_run || false }}
      SEED_ID_FROM: ${{ inputs.seed_id_from || '20000' }}
      SEED_ID_TO: ${{ inputs.seed_id_to || '20000' }}
      SEED_MAX_REQUESTS: ${{ inputs.seed_max_requests || '1' }}
      CONSOLIDATE_BACKFILL_ARTIFACTS: ${{ inputs.consolidate_backfill_artifacts || false }}
      BACKFILL_MERGE_RUN_LIMIT: ${{ inputs.backfill_merge_run_limit || '500' }}
      ZENODO_CONFIRM: ${{ inputs.confirm || '' }}
      INSTANCE: ${{ inputs.instance || 'nz-fyi' }}
      HF_REPO_ID_OVERRIDE: ${{ vars.HF_REPO_ID }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@94527f2e458b27549849d47d273a16bec83a01e9 # v7
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          set -euo pipefail
          uv sync --extra dev --frozen

      - name: Resolve instance publication identity
        run: |
          set -euo pipefail
          repo_id="$HF_REPO_ID_OVERRIDE"
          if [ -z "$repo_id" ]; then
            repo_id="$(uv run python -c 'from fyi_archive.instances import get_instance; import os; print(get_instance(os.environ["INSTANCE"]).hf_repo_id)')"
          fi
          if [ -z "$repo_id" ]; then
            echo "No Hugging Face repository is configured for $INSTANCE" >&2
            exit 1
          fi
          echo "HF_REPO_ID=$repo_id" >> "$GITHUB_ENV"
          echo "Publishing instance $INSTANCE to $repo_id"

      - name: Build capped seed bundle
        if: env.SEED_BEFORE_PUBLISH == 'true'
        env:
          SEED_CONCURRENCY: "1"
          SEED_MIN_INTERVAL: "2.0"
        run: |
          set -euo pipefail
          mkdir -p data/_state
          discovered=false
          if [ "$SEED_DRY_RUN" = "true" ]; then
            echo "Seed dry-run requested; skipping live request discovery"
          else
            for attempt in 1 2 3; do
              if uv run fyi discover \
                --backfill-ids \
                --id-from "$SEED_ID_FROM" \
                --id-to "$SEED_ID_TO" \
                --output data/_state/discovered_requests.jsonl; then
                discovered=true
                break
              fi
              [ "$attempt" = "3" ] && break
              sleep $((attempt * 20))
            done
          fi
          args=(
            --instance "$INSTANCE"
            --max-requests "$SEED_MAX_REQUESTS"
            --max-runtime-minutes 30
            --max-disk-gb 5
            --min-interval "$SEED_MIN_INTERVAL"
            --concurrency "$SEED_CONCURRENCY"
            --continue-on-error
          )
          if [ "$discovered" = "true" ]; then
            args+=(--requests-file data/_state/discovered_requests.jsonl)
          else
            args+=(--id-from "$SEED_ID_FROM" --id-to "$SEED_ID_TO" --allow-undiscovered)
          fi
          if [ "$SEED_DRY_RUN" = "true" ]; then
            args+=(--dry-run)
            manifest_derived_dir=data/derived/requests
          else
            manifest_derived_dir=data/raw/requests
          fi
          uv run fyi-archive seed run "${args[@]}"
          uv run fyi-archive manifest build \
            --instance "$INSTANCE" \
            --derived-dir "$manifest_derived_dir" \
            --fyi-cli-version 1.2.0
          uv run python -m json.tool manifests/latest_manifest.json > /dev/null
          uv run python - <<'PY'
          import json
          from pathlib import Path

          manifest = json.loads(Path("manifests/latest_manifest.json").read_text())
          if manifest["meta"]["record_count"] < 1:
              raise SystemExit("seed manifest is empty; refusing to publish")
          PY

      - name: Consolidate merged backfill artifacts
        if: env.CONSOLIDATE_BACKFILL_ARTIFACTS == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          LIMIT: ${{ env.BACKFILL_MERGE_RUN_LIMIT }}
        run: |
          set -euo pipefail
          mkdir -p .tmp/merged-backfill
          gh run list \
            --repo "$REPO" \
            --workflow "merge_backfill_artifacts.yml" \
            --status success \
            --limit "$LIMIT" \
            --json databaseId,createdAt \
            --jq 'sort_by(.createdAt) | .[].databaseId' \
            > .tmp/merged-backfill-runs.txt
          if [ ! -s .tmp/merged-backfill-runs.txt ]; then
            echo "No successful merge_backfill_artifacts.yml runs found"
            exit 1
          fi
          while IFS= read -r run_id; do
            [ -n "$run_id" ] || continue
            mkdir -p ".tmp/merged-backfill/$run_id"
            if ! gh run download "$run_id" \
              --repo "$REPO" \
              --pattern 'merged-backfill-*' \
              --dir ".tmp/merged-backfill/$run_id"; then
              echo "No merged-backfill artifact found for merge run $run_id"
            fi
          done < .tmp/merged-backfill-runs.txt
          mapfile -t manifests < <(find .tmp/merged-backfill -path '*/manifests/latest_manifest.json' | sort)
          if [ "${#manifests[@]}" -lt 1 ]; then
            echo "No merged backfill manifests were downloaded"
            exit 1
          fi
          args=()
          for manifest in "${manifests[@]}"; do
            args+=(--input-manifest "$manifest")
          done
          uv run fyi-archive manifest merge \
            "${args[@]}" \
            --manifest-path manifests/latest_manifest.json \
            --parquet-path manifests/latest_manifest.parquet \
            --authorities-path manifests/authorities.json \
            --fyi-cli-version 1.2.0
          uv run python - <<'PY'
          import json
          from pathlib import Path

          manifest = json.loads(Path("manifests/latest_manifest.json").read_text(encoding="utf-8"))
          record_count = int(manifest.get("meta", {}).get("record_count") or 0)
          payload = {
              "merge_manifest_count": len(list(Path(".tmp/merged-backfill").glob("**/manifests/latest_manifest.json"))),
              "record_count": record_count,
          }
          if record_count < 1:
              raise SystemExit("consolidated backfill manifest is empty")
          Path("dist").mkdir(parents=True, exist_ok=True)
          Path("dist/backfill_consolidation.json").write_text(
              json.dumps(payload, indent=2, sort_keys=True) + "\n",
              encoding="utf-8",
          )
          print(json.dumps(payload, indent=2, sort_keys=True))
          PY

      - name: Build release artifacts
        run: |
          set -euo pipefail
          uv run python - <<'PY'
          from pathlib import Path
          from fyi_archive.publish.export import build_duckdb_export
          from fyi_archive.publish.metadata import write_metadata

          manifest = Path("manifests/latest_manifest.json")
          parquet = Path("manifests/latest_manifest.parquet")
          if not manifest.exists() or not parquet.exists():
              raise SystemExit("manifest outputs are required before publishing")
          write_metadata(manifest, Path("metadata"))
          build_duckdb_export(manifest_parquet=parquet, output_path=Path("dist/fyi_archive.duckdb"))
          PY
          uv run python scripts/gen_sbom.py
          uv run python scripts/gen_provenance.py \
            --artifact manifests/latest_manifest.json \
            --artifact manifests/latest_manifest.parquet \
            --artifact manifests/authorities.json \
            --artifact 'metadata/*.json' \
            --artifact 'metadata/*.jsonld' \
            --artifact dist/fyi_archive.duckdb \
            --artifact dist/sbom.cdx.json

      - name: Build dry-run publication report
        if: env.DRY_RUN == 'true'
        run: |
          set -euo pipefail
          uv run python - <<'PY'
          import json
          from pathlib import Path
          from datetime import UTC, datetime

          manifest = json.loads(Path("manifests/latest_manifest.json").read_text(encoding="utf-8"))
          publication_month = datetime.now(UTC).strftime("%Y-%m")
          payload = {
              "dry_run": True,
              "publication_target": "${{ env.PUBLICATION_TARGET }}",
              "seed_before_publish": "${{ env.SEED_BEFORE_PUBLISH }}",
              "seed_dry_run": "${{ env.SEED_DRY_RUN }}",
              "record_count": int(manifest.get("meta", {}).get("record_count") or 0),
              "artifacts": [
                  path.as_posix()
                  for path in [
                      Path("manifests/latest_manifest.json"),
                      Path("manifests/latest_manifest.parquet"),
                      Path("manifests/authorities.json"),
                      Path("metadata/croissant.jsonld"),
                      Path("metadata/frictionless.json"),
                      Path("metadata/schema.org.jsonld"),
                      Path("dist/fyi_archive.duckdb"),
                      Path("dist/sbom.cdx.json"),
                      Path("dist/provenance.json"),
                  ]
                  if path.exists()
              ],
          }
          Path("dist").mkdir(parents=True, exist_ok=True)
          Path("dist/publish_dry_run.json").write_text(json.dumps(payload, indent=2, sort_keys=True) + "\n", encoding="utf-8")
          Path("versions/latest_publish_dry_run.json").parent.mkdir(parents=True, exist_ok=True)
          Path("versions/latest_publish_dry_run.json").write_text(json.dumps(payload, indent=2, sort_keys=True) + "\n", encoding="utf-8")
          month_path = Path("versions") / publication_month / "publish_dry_run.json"
          month_path.parent.mkdir(parents=True, exist_ok=True)
          month_path.write_text(json.dumps(payload, indent=2, sort_keys=True) + "\n", encoding="utf-8")
          PY

      - name: Publish Hugging Face dataset
        if: env.DRY_RUN != 'true' && (env.PUBLICATION_TARGET == 'huggingface' || env.PUBLICATION_TARGET == 'all' || env.PUBLICATION_TARGET == 'all_with_osf')
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          set -euo pipefail
          uv run python - <<'PY'
          import os
          import shutil
          from pathlib import Path
          from fyi_archive.publish.hf_publish import publish_folder_to_hf, sha256_file, verify_remote_manifest
          from fyi_archive.publish.verification import (
              ArtifactVerification,
              MirrorVerification,
              append_verification_report,
              manifest_record_count,
          )

          repo_id = os.environ["HF_REPO_ID"]
          token = os.environ["HF_TOKEN"]
          publish_root = Path("publish/huggingface")
          if publish_root.exists():
              shutil.rmtree(publish_root)
          for source in [
              Path("manifests"),
              Path("metadata"),
              Path("schemas"),
              Path("data/raw/requests"),
              Path("data/warc"),
              Path("data/attachments"),
              Path("dist/site_snapshots"),
              Path("dist/fyi_archive.duckdb"),
              Path("dist/sbom.cdx.json"),
              Path("dist/provenance.json"),
          ]:
              if not source.exists():
                  continue
              destination = publish_root / source
              destination.parent.mkdir(parents=True, exist_ok=True)
              if source.is_dir():
                  shutil.copytree(source, destination, dirs_exist_ok=True)
              else:
                  shutil.copy2(source, destination)
          staged_manifest = publish_root / "manifests/latest_manifest.json"
          manifest_sha256 = sha256_file(Path("manifests/latest_manifest.json"))
          if sha256_file(staged_manifest) != manifest_sha256:
              raise SystemExit("staged manifest SHA-256 mismatch")
          commit_info = publish_folder_to_hf(
              folder_path=publish_root,
              repo_id=repo_id,
              token=token,
          )
          print("hf manifest sha256", manifest_sha256)
          print("hf upload commit", getattr(commit_info, "oid", None))
          if not verify_remote_manifest(
              repo_id=repo_id,
              local_manifest=Path("manifests/latest_manifest.json"),
              token=token,
              revision=getattr(commit_info, "oid", None),
          ):
              raise SystemExit("remote manifest SHA-256 mismatch")
          append_verification_report(
              Path("dist/mirror_verification.json"),
              MirrorVerification(
                  mirror="huggingface",
                  verified=True,
                  record_count=manifest_record_count(Path("manifests/latest_manifest.json")),
                  artifacts=[
                      ArtifactVerification(
                          name="latest_manifest.json",
                          present=True,
                          size_matches=True,
                          checksum_matches=True,
                          local_sha256=manifest_sha256,
                          remote_checksum="sha256:" + manifest_sha256,
                      ),
                  ],
                  details={"repo_id": repo_id, "manifest_sha256_verified": True},
              ),
          )
          PY

      - name: Verify Hugging Face mirror
        if: env.DRY_RUN != 'true' && (env.PUBLICATION_TARGET == 'huggingface' || env.PUBLICATION_TARGET == 'all' || env.PUBLICATION_TARGET == 'all_with_osf')
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          set -euo pipefail
          uv run fyi-archive publish verify \
            --hf-repo-id "$HF_REPO_ID" \
            --report-path dist/mirror_verification.json

      - name: Create Zenodo draft
        if: env.DRY_RUN != 'true' && (env.PUBLICATION_TARGET == 'zenodo' || env.PUBLICATION_TARGET == 'all' || env.PUBLICATION_TARGET == 'all_with_osf')
        env:
          CONFIRM: ${{ env.ZENODO_CONFIRM }}
          PUBLISH: ${{ env.PUBLISH_ZENODO }}
          ZENODO_TOKEN: ${{ secrets.ZENODO_TOKEN }}
        run: |
          set -euo pipefail
          uv run python - <<'PY'
          import json
          import os
          from pathlib import Path
          from fyi_archive.publish.verification import (
              MirrorVerification,
              append_verification_report,
              build_local_artifacts,
              compare_artifacts,
              manifest_record_count,
              mirror_verified,
          )
          from fyi_archive.publish.zenodo_publish import (
              create_draft,
              deposition_artifacts,
              get_deposition,
              load_metadata,
              publish_draft,
              upload_file,
          )

          token = os.environ["ZENODO_TOKEN"]
          draft = create_draft(token=token, metadata=load_metadata())
          bucket = draft["links"]["bucket"]
          artifact_paths = [
              Path("manifests/latest_manifest.json"),
              Path("manifests/latest_manifest.parquet"),
              Path("manifests/authorities.json"),
              Path("metadata/croissant.jsonld"),
              Path("metadata/frictionless.json"),
              Path("metadata/schema.org.jsonld"),
              Path("dist/fyi_archive.duckdb"),
              Path("dist/sbom.cdx.json"),
              Path("dist/provenance.json"),
          ]
          for path in artifact_paths:
              if path.exists():
                  upload_file(token=token, bucket_url=bucket, path=path)
          local_artifacts = build_local_artifacts(artifact_paths)
          remote_artifacts = deposition_artifacts(
              get_deposition(token=token, deposition_id=int(draft["id"]))
          )
          artifact_results = compare_artifacts(
              local_artifacts=local_artifacts,
              remote_artifacts=remote_artifacts,
          )
          append_verification_report(
              Path("dist/mirror_verification.json"),
              MirrorVerification(
                  mirror="zenodo",
                  verified=mirror_verified(artifact_results),
                  record_count=manifest_record_count(Path("manifests/latest_manifest.json")),
                  artifacts=artifact_results,
                  details={"deposition_id": draft["id"], "published": os.environ["PUBLISH"] == "true"},
              ),
          )
          if not mirror_verified(artifact_results):
              raise SystemExit("Zenodo artifact verification failed")
          if os.environ["PUBLISH"] == "true":
              result = publish_draft(
                  token=token,
                  deposition_id=int(draft["id"]),
                  confirm=os.environ["CONFIRM"],
              )
              Path("dist/zenodo_publish.json").write_text(json.dumps(result, indent=2) + "\n")
          PY

      - name: Verify Zenodo mirror
        if: env.DRY_RUN != 'true' && (env.PUBLICATION_TARGET == 'zenodo' || env.PUBLICATION_TARGET == 'all' || env.PUBLICATION_TARGET == 'all_with_osf')
        env:
          ZENODO_TOKEN: ${{ secrets.ZENODO_TOKEN }}
        run: |
          set -euo pipefail
          deposition_id="$(python - <<'PY'
          import json
          from pathlib import Path
          report_path = Path("dist/mirror_verification.json")
          reports = json.loads(report_path.read_text())
          for report in reports:
              if report.get("mirror") == "zenodo":
                  print(report["details"]["deposition_id"])
                  break
          else:
              raise SystemExit("Zenodo report missing")
          PY
          )"
          uv run fyi-archive publish verify \
            --zenodo-deposition-id "$deposition_id" \
            --zenodo-token "$ZENODO_TOKEN" \
            --report-path dist/mirror_verification.json

      - name: Publish OSF mirror
        if: env.DRY_RUN != 'true' && (env.PUBLICATION_TARGET == 'osf' || env.PUBLICATION_TARGET == 'all_with_osf')
        env:
          OSF_PARENT_ID: ${{ vars.OSF_PARENT_ID }}
          OSF_TOKEN: ${{ secrets.OSF_TOKEN }}
        run: |
          set -euo pipefail
          uv run python - <<'PY'
          import os
          from pathlib import Path
          from fyi_archive.publish.osf_publish import (
              ensure_component,
              get_osfstorage_upload_url,
              list_files,
              upload_file,
          )
          from fyi_archive.publish.verification import (
              MirrorVerification,
              append_verification_report,
              build_local_artifacts,
              compare_artifacts,
              manifest_record_count,
              mirror_verified,
          )

          token = os.environ["OSF_TOKEN"]
          parent_id = os.environ["OSF_PARENT_ID"]
          component = ensure_component(
              token=token,
              parent_id=parent_id,
              title="fyi-archive data mirror",
          )
          component_id = component["data"]["id"]
          upload_url = get_osfstorage_upload_url(token=token, node_id=component_id)
          artifact_paths = [
              Path("manifests/latest_manifest.json"),
              Path("manifests/latest_manifest.parquet"),
              Path("manifests/authorities.json"),
              Path("metadata/croissant.jsonld"),
              Path("metadata/frictionless.json"),
              Path("metadata/schema.org.jsonld"),
              Path("dist/fyi_archive.duckdb"),
              Path("dist/sbom.cdx.json"),
              Path("dist/provenance.json"),
          ]
          for path in artifact_paths:
              if path.exists():
                  upload_file(token=token, upload_url=upload_url, path=path)
          artifact_results = compare_artifacts(
              local_artifacts=build_local_artifacts(artifact_paths),
              remote_artifacts=list_files(token=token, node_id=component_id),
          )
          append_verification_report(
              Path("dist/mirror_verification.json"),
              MirrorVerification(
                  mirror="osf",
                  verified=mirror_verified(artifact_results),
                  record_count=manifest_record_count(Path("manifests/latest_manifest.json")),
                  artifacts=artifact_results,
                  details={"parent_id": parent_id, "component_id": component_id},
              ),
          )
          if not mirror_verified(artifact_results):
              raise SystemExit("OSF artifact verification failed")
          PY

      - name: Verify OSF mirror
        if: env.DRY_RUN != 'true' && (env.PUBLICATION_TARGET == 'osf' || env.PUBLICATION_TARGET == 'all_with_osf')
        env:
          # The job resolves HF_REPO_ID for publication identity. Clear it so
          # the CLI's envvar-backed option cannot add a stale HF check here.
          HF_REPO_ID: ""
          OSF_TOKEN: ${{ secrets.OSF_TOKEN }}
        run: |
          set -euo pipefail
          node_id="$(python - <<'PY'
          import json
          from pathlib import Path
          report_path = Path("dist/mirror_verification.json")
          reports = json.loads(report_path.read_text())
          for report in reports:
              if report.get("mirror") == "osf":
                  print(report["details"]["component_id"])
                  break
          else:
              raise SystemExit("OSF report missing")
          PY
          )"
          uv run fyi-archive publish verify \
            --osf-node-id "$node_id" \
            --osf-token "$OSF_TOKEN" \
            --report-path dist/mirror_verification.json

      - name: Build deterministic dry-run verification report
        if: env.DRY_RUN == 'true'
        run: |
          set -euo pipefail
          uv run python - <<'PY'
          import json
          from pathlib import Path

          payload = {
              "dry_run": True,
              "comparison": {
                  "fully_verified": False,
                  "reason": "remote mirror verification is skipped in dry-run mode",
              },
              "remote_reads": False,
              "remote_writes": False,
          }
          output = Path("dist/backfill_verification.json")
          output.parent.mkdir(parents=True, exist_ok=True)
          output.write_text(json.dumps(payload, indent=2, sort_keys=True) + "\n", encoding="utf-8")
          PY

      - name: Build backfill verification report
        if: env.DRY_RUN != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          ZENODO_TOKEN: ${{ secrets.ZENODO_TOKEN }}
        run: |
          set -euo pipefail
          uv run fyi-archive backfill report \
            --repo "$GITHUB_REPOSITORY" \
            --manifest-path manifests/latest_manifest.json \
            --mirror-report-path dist/mirror_verification.json \
            --output-path dist/backfill_verification.json \
            --output-dir versions

      - name: Upload publish evidence
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: publish-evidence
          path: |
            data/_state/ledger.jsonl
            manifests/*.json
            manifests/*.parquet
            metadata/*.json
            metadata/*.jsonld
            dist/*.json
            dist/*.duckdb
            versions/**/*.json

      - name: Attest publish evidence
        uses: actions/attest-build-provenance@78e6cbd37d0ac1a40113c04f2037dacf1ea3f12e # v4
        with:
          subject-path: |
            dist/sbom.cdx.json
            dist/provenance.json
            dist/fyi_archive.duckdb

      - name: Store versioned mirror evidence
        if: hashFiles('versions/latest_mirror_verification.json') != ''
        uses: peter-evans/create-pull-request@22a9089034f40e5a961c8808d113e2c98fb63676 # v7
        with:
          token: ${{ secrets.WORKFLOW_PAT }}
          commit-message: "chore: store monthly mirror verification evidence"
          title: "chore: store monthly mirror verification evidence"
          body: "Stores the latest small JSON evidence report for archive mirror verification. Archive payloads remain on the mirrors."
          branch: "archive/store-mirror-verification"
          add-paths: |
